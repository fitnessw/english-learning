const segments = [{"s": 62.4, "e": 65.13, "t": "Today we have an epic roadtrip ahead of us", "zh": "今天，我们面前有一场史诗般的公路旅行"}, {"s": 65.63, "e": 67.85, "t": "We're gonna be going over these mountainshere", "zh": "我们要翻越这些山"}, {"s": 67.92, "e": 70.23, "t": "to the poorest county in California,", "zh": "到加州最贫穷的县，"}, {"s": 70.73, "e": 72.04, "t": "Trinity County.", "zh": "三一县。"}, {"s": 72.66, "e": 77.9, "t": "I think it's fair to say California is one of the most mixed up states in the country", "zh": "我认为可以公平地说加利福尼亚州是该国最混乱的州之一"}, {"s": 77.97, "e": 79.11, "t": "if not the most.", "zh": "如果不是最多的话。"}, {"s": 79.18, "e": 82.52, "t": "What we're gonna see today is a completely different world", "zh": "今天我们将看到一个完全不同的世界"}, {"s": 82.59, "e": 85.77, "t": "than say Los Angeles or San Francisco.", "zh": "比说洛杉矶或旧金山。"}, {"s": 86.68, "e": 88.83, "t": "So we're gonna hit the back roads out here,", "zh": "所以我们要走这里的小路，"}, {"s": 88.89, "e": 91.14, "t": "get lost in this rugged landscape,", "zh": "迷失在这崎岖的风景中，"}, {"s": 91.84, "e": 94.25, "t": "talk to the locals, hear what they have to say,", "zh": "与当地人交谈，听听他们怎么说，"}, {"s": 94.32, "e": 96.09, "t": "see the beautiful sites,", "zh": "看看美丽的景点，"}, {"s": 96.15, "e": 97.83, "t": "and learn a thing or two.", "zh": "并学习一两件事。"}, {"s": 98.33, "e": 99.23, "t": "Let's do this.", "zh": "让我们这样做吧。"}, {"s": 115.55, "e": 119.76, "t": "Mean income of $42,000 per person.", "zh": "每人平均收入为 42,000 美元。"}, {"s": 120.36, "e": 124.47, "t": "Santa Clara County, the richest county in the state in the Bay Area", "zh": "圣克拉拉县，湾区州最富有的县"}, {"s": 125.14, "e": 129.28, "t": "is $154,000 per person.", "zh": "每人154,000美元。"}, {"s": 129.78, "e": 132.4, "t": "So huge divide on that front", "zh": "在这方面存在如此巨大的分歧"}, {"s": 132.47, "e": 136.75, "t": "but there are only 16,000 people living in the county.", "zh": "但全县只有16,000人。"}, {"s": 137.59, "e": 140.0, "t": "It's around 3,200 square miles.", "zh": "面积约 3,200 平方英里。"}, {"s": 140.07, "e": 144.84, "t": "So it's very sparsely populated with only a few small towns in it", "zh": "所以这里人烟稀少，只有几个小镇"}, {"s": 145.6, "e": 148.39, "t": "and here's our first bit of civilization.", "zh": "这就是我们的第一个文明。"}, {"s": 149.07, "e": 151.52, "t": "Some old rundown buildings.", "zh": "一些破旧的老建筑。"}, {"s": 152.39, "e": 154.45, "t": "Just very wild landscapes out here", "zh": "这里只是非常野生的风景"}, {"s": 154.52, "e": 156.82, "t": "I've actually been driving for quite some time.", "zh": "其实我已经开车有一段时间了。"}, {"s": 156.89, "e": 159.45, "t": "I've had the camera off 'cause it's just cruising", "zh": "我把相机关了，因为它只是巡航"}, {"s": 160.03, "e": 165.79, "t": "and this is one of the most remote parts of the country in a way", "zh": "从某种程度上来说，这是该国最偏远的地区之一"}, {"s": 165.85, "e": 167.87, "t": "as far as big cities being around.", "zh": "就周围的大城市而言。"}, {"s": 169.41, "e": 173.39, "t": "You can see that times were better here in Trinity County", "zh": "您可以看到三一县的时代更好"}, {"s": 174.3, "e": 177.12, "t": "What's that, an old arcade? Some storage units?", "zh": "那是什么，一个古老的游乐场？一些存储单元？"}, {"s": 178.7, "e": 180.18, "t": "Let's check out this store.", "zh": "我们来看看这家店吧。"}, {"s": 181.26, "e": 183.64, "t": "Salyer Store, they got the Bigfoot up there.", "zh": "萨利尔商店，他们在那里找到了大脚怪。"}, {"s": 188.75, "e": 190.7, "t": "-How you doin', boss? -Pretty good. You?", "zh": "-你好吗，老板？ -不错。你？"}, {"s": 190.77, "e": 193.18, "t": "Good, you guys got Bigfoot sightings out here?", "zh": "很好，你们在这里看到过大脚怪吗？"}, {"s": 193.24, "e": 194.86, "t": "-There's been lore about it.", "zh": "-有关于它的传说。"}, {"s": 194.92, "e": 197.94, "t": "I've never personally seen it but people talk about it a lot.", "zh": "我从未亲眼见过它，但人们经常谈论它。"}, {"s": 199.08, "e": 201.2, "t": "-I think there's something out there, yeah.", "zh": "-我认为那里有东西，是的。"}, {"s": 201.26, "e": 203.49, "t": "The woods are beautiful but they can be eerie", "zh": "树林很美丽，但也很怪异"}, {"s": 203.56, "e": 206.06, "t": "especially at night time, mist, fog settles in too.", "zh": "尤其是晚上，雾气弥漫。"}, {"s": 206.13, "e": 208.45, "t": "It's like you hear noises. What is that?", "zh": "就好像你听到了噪音。那是什么？"}, {"s": 210.05, "e": 211.76, "t": "-[man] Never know. -[Peter] Yeah.", "zh": "-[男人]永远不知道。 -[彼得]是的。"}, {"s": 212.55, "e": 215.67, "t": "Hello, sir. I want t to know about Bigfoot, are you a believer?", "zh": "你好先生。我想了解大脚怪，你是信徒吗？"}, {"s": 215.73, "e": 217.35, "t": "-Sasquatch? -Sasquatch.", "zh": "-大脚野人？ -大脚野人。"}, {"s": 217.42, "e": 219.51, "t": "When it started, the guy that was…", "zh": "当事情开始时，那个人是……"}, {"s": 220.01, "e": 222.11, "t": "-Bear sh*t in the woods. -[laughter]", "zh": "-熊在树林里拉屎。 -[笑声]"}, {"s": 222.17, "e": 225.3, "t": "-So that's the story, it was a bear? -Couple guys started that.", "zh": "-这就是故事，那是一只熊？ -几个家伙开始了。"}, {"s": 225.37, "e": 227.15, "t": "-Oh, started the rumor? -Yeah.", "zh": "-哦，开始谣言了？ -是的。"}, {"s": 227.22, "e": 230.35, "t": "Put things on their feet and was like making tracks.", "zh": "把东西放在他们的脚上，就像留下足迹一样。"}, {"s": 230.42, "e": 231.44, "t": "-No way.", "zh": "-决不。"}, {"s": 231.51, "e": 233.39, "t": "How is it living out here?", "zh": "这里的生活怎么样？"}, {"s": 233.46, "e": 236.31, "t": "It's the only place I've lived since 1955.", "zh": "这是我自 1955 年以来唯一住过的地方。"}, {"s": 240.51, "e": 243.54, "t": "Used to work in a sawmill in Bear Ranch.", "zh": "曾在熊牧场的锯木厂工作。"}, {"s": 243.6, "e": 246.23, "t": "-You worked at the sawmill? -For 37 years.", "zh": "-你在锯木厂工作过吗？ - 37 年了。"}, {"s": 246.3, "e": 249.76, "t": "-The Endangered Species Act got it. -Shut it down?", "zh": "-《濒危物种法》得到了它。 - 关掉它？"}, {"s": 250.99, "e": 254.44, "t": "-We couldn't get no more timber. -What did you do for work after that?", "zh": "-我们再也找不到木材了。 - 之后你做什么工作？"}, {"s": 254.51, "e": 256.59, "t": "Worked over at Pacific Choice.", "zh": "曾在 Pacific Choice 工作。"}, {"s": 256.66, "e": 258.69, "t": "It's a seafood place in Eureka.", "zh": "这是尤里卡的一家海鲜店。"}, {"s": 258.76, "e": 260.98, "t": "-You drove all the way to Eureka? -Every day.", "zh": "-你一路开车去尤里卡？ -每天。"}, {"s": 263.17, "e": 265.09, "t": "No, I can make it in less than that.", "zh": "不，我可以用更少的时间做到这一点。"}, {"s": 265.16, "e": 267.5, "t": "So I figured I'm working on that till I retire.", "zh": "所以我想我会一直致力于这个工作直到退休。"}, {"s": 267.56, "e": 268.4, "t": "-Gotcha.", "zh": "-明白了。"}, {"s": 268.46, "e": 270.93, "t": "Then when the Endangered Species Act kept…", "zh": "然后，当《濒危物种法》保留时……"}, {"s": 270.99, "e": 273.77, "t": "Because the spotted owl, couldn't get no more timber.", "zh": "因为斑点猫头鹰无法再获得木材了。"}, {"s": 274.27, "e": 275.82, "t": "So the mill faded away.", "zh": "于是磨坊就渐渐消失了。"}, {"s": 276.32, "e": 278.24, "t": "-Is that still big out here, timber?", "zh": "-这里还很大吗，木材？"}, {"s": 278.31, "e": 279.43, "t": "There ain't no timber?", "zh": "没有木头吗？"}, {"s": 279.49, "e": 281.12, "t": "-No timber? -Owl got it.", "zh": "-没有木材吗？ -猫头鹰明白了。"}, {"s": 281.19, "e": 282.87, "t": "-The owl got it? -Spotted owl.", "zh": "-猫头鹰明白了吗？ -斑点猫头鹰。"}, {"s": 282.94, "e": 285.36, "t": "Now the barn owl's eating spotted owls. [laughs]", "zh": "现在仓鸮正在吃斑点猫头鹰。 [笑]"}, {"s": 286.61, "e": 288.74, "t": "-So what's the industry out here now?", "zh": "- 那么现在这里的行业是什么？"}, {"s": 288.81, "e": 290.52, "t": "There isn't any. That's just it.", "zh": "没有。就是这样。"}, {"s": 290.58, "e": 291.42, "t": "-Nothing?", "zh": "-没有什么？"}, {"s": 292.62, "e": 294.08, "t": "Tried pot for a while.", "zh": "尝试了一段时间的锅。"}, {"s": 294.15, "e": 295.07, "t": "-Growing?", "zh": "-生长？"}, {"s": 295.14, "e": 296.06, "t": "-[laughs]", "zh": "-[笑]"}, {"s": 296.13, "e": 298.65, "t": "-How did that go? -That got a little spooky.", "zh": "- 进展如何？ -这有点令人毛骨悚然。"}, {"s": 298.72, "e": 299.55, "t": "Spooky why?", "zh": "诡异的是为什么？"}, {"s": 300.49, "e": 302.59, "t": "You gotta keep looking over your shoulder.", "zh": "你必须不断回头看。"}, {"s": 305.3, "e": 307.09, "t": "-$4,000 or $5,000 a pound?", "zh": "-每磅 4,000 美元还是 5,000 美元？"}, {"s": 307.16, "e": 308.54, "t": "Yeah, at least that.", "zh": "是的，至少是这样。"}, {"s": 308.61, "e": 312.41, "t": "-So you had timber, you had weed, now you're looking--", "zh": "-所以你有木材，你有杂草，现在你正在寻找--"}, {"s": 312.48, "e": 313.65, "t": "-Nothing. -Nothing?", "zh": "-没有什么。 -没有什么？"}, {"s": 313.71, "e": 316.6, "t": "Just old age pension. [laughs]", "zh": "只剩下养老金了。 [笑]"}, {"s": 318.65, "e": 319.56, "t": "Thanks, guys.", "zh": "谢谢，伙计们。"}, {"s": 319.63, "e": 321.35, "t": "-Okay. -Right on. What's your name?", "zh": "-好的。 -就在。你叫什么名字？"}, {"s": 321.42, "e": 323.34, "t": "Peter, I have a son named Peter.", "zh": "彼得，我有一个儿子叫彼得。"}, {"s": 323.41, "e": 326.19, "t": "-Okay, good name. Keep it going. That's good to hear.", "zh": "-好吧，好名字。继续下去。很高兴听到这个消息。"}, {"s": 333.95, "e": 335.81, "t": "-Hello. -Hello, how you doing, ma'am?", "zh": "-你好。 -你好，女士，你好吗？"}, {"s": 335.88, "e": 336.8, "t": "-Okay.", "zh": "-好的。"}, {"s": 357.39, "e": 360.92, "t": "Looks like the last iteration was a kayak operation.", "zh": "看起来最后一次迭代是皮划艇操作。"}, {"s": 361.93, "e": 364.17, "t": "We're starting to get into it though, guys.", "zh": "不过，伙计们，我们已经开始进入这个话题了。"}, {"s": 364.9, "e": 369.07, "t": "Around the 1850s is when gold was found in these mountains.", "zh": "1850 年代左右，人们在这些山脉中发现了黄金。"}, {"s": 370.15, "e": 372.47, "t": "People came west", "zh": "人们向西来"}, {"s": 373.53, "e": 374.36, "t": "from the east", "zh": "来自东方"}, {"s": 375.36, "e": 377.33, "t": "and the town we're going to", "zh": "还有我们要去的小镇"}, {"s": 377.4, "e": 379.98, "t": "had 2,000 Chinese that lived there.", "zh": "有2000名中国人住在那里。"}, {"s": 380.05, "e": 381.73, "t": "They had their own Chinataown", "zh": "他们有自己的唐人街"}, {"s": 382.29, "e": 387.43, "t": "and they were part of the gold operations, the mining operations back in the day.", "zh": "它们是黄金业务、采矿业务的一部分。"}, {"s": 388.01, "e": 390.85, "t": "The spaces between are massive here.", "zh": "这里之间的空间很大。"}, {"s": 391.57, "e": 393.39, "t": "The camera's off most of the time", "zh": "相机大部分时间都处于关闭状态"}, {"s": 394.56, "e": 399.02, "t": "because it's just long stretches of road without any people.", "zh": "因为那条路很长，没有人。"}, {"s": 400.05, "e": 402.16, "t": "You see occasiaonal houses like that", "zh": "你偶尔会看到这样的房子"}, {"s": 403.57, "e": 406.62, "t": "and then markers of the old world.", "zh": "然后是旧世界的标记。"}, {"s": 413.03, "e": 416.7, "t": "We drove roughly 55 miles from where we started today", "zh": "我们从今天出发的地方行驶了大约 55 英里"}, {"s": 416.77, "e": 419.17, "t": "and now we're in the town of Weaverville.", "zh": "现在我们在韦弗维尔镇。"}, {"s": 419.77, "e": 423.81, "t": "Only 3,500 people live here but it's the biggest town in the county.", "zh": "这里只有 3,500 人居住，但却是该县最大的城镇。"}, {"s": 426.43, "e": 427.75, "t": "County seat.", "zh": "县城。"}, {"s": 429.21, "e": 432.53, "t": "Gotta say, quite a cool looking place.", "zh": "不得不说，一个看起来很酷的地方。"}, {"s": 433.51, "e": 434.83, "t": "Old architecture.", "zh": "老建筑。"}, {"s": 441.68, "e": 443.03, "t": "-Hello. -Hey, how you doing?", "zh": "-你好。 -嘿，你好吗？"}, {"s": 443.1, "e": 444.55, "t": "-I'm good. How are you? -Good.", "zh": "-我很好。你好吗？ -好的。"}, {"s": 444.62, "e": 446.25, "t": "All these old buildings what?", "zh": "这些老建筑都是什么？"}, {"s": 446.31, "e": 449.85, "t": "-They are the original buildings on Main Street.", "zh": "-它们是大街上原来的建筑。"}, {"s": 449.92, "e": 451.13, "t": "-Okay. -It's really cool.", "zh": "-好的。 -这真的很酷。"}, {"s": 451.2, "e": 453.62, "t": "-They have, if you go to the front… -Yeah", "zh": "-他们有，如果你去前线...... -是的"}, {"s": 453.69, "e": 456.73, "t": "We have… 'cause this was a Chinese mining town", "zh": "我们有……因为这是一个中国采矿小镇"}, {"s": 457.4, "e": 462.34, "t": "and of course during segreation and stuff and so Chinese men weren't allowed out", "zh": "当然，在隔离期间，中国男人不被允许出去"}, {"s": 462.4, "e": 465.12, "t": "past 5:00 PM so they built a tunnel system underneath.", "zh": "下午 5:00 以后，他们在下面建造了一个隧道系统。"}, {"s": 465.19, "e": 466.18, "t": "-No way. -Mm-hmm.", "zh": "-决不。 -嗯嗯。"}, {"s": 466.25, "e": 468.84, "t": "Weaverville, so they could get from bar to bar.", "zh": "韦弗维尔，这样他们就可以从一个酒吧到另一个酒吧。"}, {"s": 468.91, "e": 471.98, "t": "It's all blocked in now but our whole storage unit", "zh": "现在一切都被封锁了，但我们的整个存储单元"}, {"s": 472.05, "e": 475.01, "t": "underneath the ground, if you go and order you can walk over it", "zh": "在地下，如果你去点菜，你可以走过它"}, {"s": 475.07, "e": 476.61, "t": "but I can't open it for ya.", "zh": "但我无法为你打开它。"}, {"s": 476.68, "e": 477.54, "t": "-Okay, gotcha.", "zh": "-好吧，明白了。"}, {"s": 477.61, "e": 479.06, "t": "Just safety-wise but…", "zh": "只是出于安全考虑，但是……"}, {"s": 479.13, "e": 480.67, "t": "-How was growing up here?", "zh": "-在这里长大怎么样？"}, {"s": 480.73, "e": 481.57, "t": "So fun.", "zh": "太有趣了。"}, {"s": 481.63, "e": 482.75, "t": "-So fun? -So fun, yeah.", "zh": "-这么好玩吗？ - 太有趣了，是的。"}, {"s": 482.82, "e": 484.73, "t": "I just moved home.", "zh": "我刚搬回家。"}, {"s": 484.79, "e": 486.71, "t": "I graduated college in June.", "zh": "我六月大学毕业。"}, {"s": 486.77, "e": 490.04, "t": "I think as a teenager, you're like, \"It's small, I wanna get out.\"", "zh": "我认为作为一个青少年，你会说，“它很小，我想出去。”"}, {"s": 490.11, "e": 491.85, "t": "-Sure. -Go experience things.", "zh": "-当然。 -去体验事物。"}, {"s": 491.92, "e": 493.02, "t": "But it's a lot of fun.", "zh": "但这很有趣。"}, {"s": 493.09, "e": 495.63, "t": "Very Hallmark. You watch Hallmark movies at all?", "zh": "非常标志性的。你看过 Hallmark 电影吗？"}, {"s": 495.7, "e": 497.93, "t": "I don't but what's that, like Pleasantville?", "zh": "我不知道，但那是什么，比如 Pleasantville？"}, {"s": 498.0, "e": 500.0, "t": "Yeah, like very… just cheesey.", "zh": "是的，就像非常……只是奶酪味。"}, {"s": 500.07, "e": 503.0, "t": "Like holiday town.", "zh": "就像度假小镇一样。"}, {"s": 503.57, "e": 505.75, "t": "I went to school in San Luis Obispo", "zh": "我在圣路易斯奥比斯波上学"}, {"s": 505.81, "e": 508.64, "t": "and it is so much different than here.", "zh": "这里和这里有很大不同。"}, {"s": 508.71, "e": 510.64, "t": "People have never heard of Weaverville", "zh": "人们从未听说过韦弗维尔"}, {"s": 510.71, "e": 515.46, "t": "You get up and introduce yourself, \"My name's Alissa, I'm from Weaverville.\"", "zh": "你站起来自我介绍，“我叫艾丽莎，来自韦弗维尔。”"}, {"s": 515.53, "e": 516.44, "t": "\"Where?\"", "zh": "“在哪里？”"}, {"s": 516.51, "e": 518.34, "t": "-Right, that's Central Coast,", "zh": "-对，那是中央海岸，"}, {"s": 518.4, "e": 520.54, "t": "what's that, like seven hours of driving?", "zh": "那是什么，比如七个小时的车程？"}, {"s": 520.61, "e": 523.32, "t": "-Yeah, it's like eight and a half. -Eight and a half?", "zh": "-是的，大约八点半。 -八岁半？"}, {"s": 523.39, "e": 524.92, "t": "-You guys are out there. -Yeah.", "zh": "-你们在外面。 -是的。"}, {"s": 525.42, "e": 526.88, "t": "No, we're up in the boonies.", "zh": "不，我们在郊区。"}, {"s": 526.94, "e": 529.72, "t": "-It's cool. All right. Im gonna check this out up here.", "zh": "-这很酷。好的。我要在这里检查一下。"}, {"s": 529.78, "e": 530.62, "t": "-Please do.", "zh": "-请这样做。"}, {"s": 530.68, "e": 533.0, "t": "-All right, thank you. -Yeah, of course.", "zh": "-好的，谢谢。 -是的，当然。"}, {"s": 537.65, "e": 539.31, "t": "-How you doing, sir? -How are you?", "zh": "-你好吗，先生？ -你好吗？"}, {"s": 539.38, "e": 540.35, "t": "-Doing well. -Good.", "zh": "- 做得很好。 -好的。"}, {"s": 540.42, "e": 544.56, "t": "-Do you live in town? How are things? -How you doing, man?", "zh": "-你住在城里吗？最近怎么样？ -你好吗，伙计？"}, {"s": 544.63, "e": 546.86, "t": "Good, I'm making a video on Trinity County.", "zh": "很好，我正在制作有关三一县的视频。"}, {"s": 546.93, "e": 548.13, "t": "-Okay. -Oh, gosh.", "zh": "-好的。 -哦，天哪。"}, {"s": 548.19, "e": 550.12, "t": "Do you guys wanna jump in it?", "zh": "你们想跳进去吗？"}, {"s": 550.18, "e": 552.9, "t": "-Depends on what is your outlook?", "zh": "-取决于你的观点是什么？"}, {"s": 552.97, "e": 554.69, "t": "-My outlook is I have none.", "zh": "-我的看法是我没有。"}, {"s": 554.75, "e": 557.59, "t": "I just talk to the locals and it's really their outlook.", "zh": "我只是和当地人交谈，这确实是他们的看法。"}, {"s": 557.65, "e": 560.12, "t": "It's the friendliest town I've ever been in.", "zh": "这是我去过的最友好的小镇。"}, {"s": 560.18, "e": 562.2, "t": "-Friendliest town you've been in? -Yeah.", "zh": "-你去过的最友好的城镇？ -是的。"}, {"s": 562.27, "e": 567.61, "t": "Even though there are people that are right wing.", "zh": "即使有人是右翼。"}, {"s": 567.67, "e": 569.65, "t": "-It's right wing? -Yeah, yeah.", "zh": "-这是右翼吗？ -是啊是啊。"}, {"s": 569.72, "e": 572.21, "t": "-Oh, and you're not. \"Dump Trump\"? -Yeah.", "zh": "-哦，你不是。 “甩掉特朗普”？ -是的。"}, {"s": 572.28, "e": 574.15, "t": "-Okay. -Don't get him started on this.", "zh": "-好的。 -别让他开始做这件事。"}, {"s": 574.22, "e": 577.28, "t": "-Don't? Okay. -No, no.", "zh": "-不？好的。 -不，不。"}, {"s": 577.78, "e": 580.74, "t": "Is this the underground way for the Chinese back in the day?", "zh": "这就是当年中国人的地下通道吗？"}, {"s": 580.8, "e": 584.19, "t": "-This whole block system had underground areas", "zh": "-整个街区系统都有地下区域"}, {"s": 584.26, "e": 587.87, "t": "where they would, as I understand it, the Asian community", "zh": "据我了解，他们会在那里，亚洲社区"}, {"s": 587.94, "e": 590.28, "t": "used to be able to move through the community.", "zh": "过去可以在社区中移动。"}, {"s": 590.35, "e": 592.55, "t": "-From this building… this one,", "zh": "-从这栋大楼……这栋，"}, {"s": 592.62, "e": 595.76, "t": "next one, next one, next one, are all connected.", "zh": "下一张，下一张，下一张，都是相连的。"}, {"s": 595.83, "e": 597.47, "t": "Looking through that door", "zh": "透过那扇门看"}, {"s": 597.97, "e": 601.51, "t": "and you could go through here and this door on the other side.", "zh": "你可以穿过这里和另一边的这扇门。"}, {"s": 602.18, "e": 604.56, "t": "-But they've been blocked off. -Okay.", "zh": "-但他们已经被封锁了。 -好的。"}, {"s": 607.11, "e": 607.94, "t": "-Yeah.", "zh": "-是的。"}, {"s": 608.01, "e": 610.41, "t": "-We just made these today also. -Okay, I'm in.", "zh": "-我们今天也刚做了这些。 -好的，我加入了。"}, {"s": 610.48, "e": 612.02, "t": "-Just one of 'em? -Yep.", "zh": "-只是其中之一？ -是的。"}, {"s": 613.43, "e": 616.05, "t": "-[Peter] Thank you. -[man] I'm gonna open this up.", "zh": "-[彼得]谢谢你。 -[男人]我要打开这个。"}, {"s": 616.92, "e": 617.75, "t": "All right.", "zh": "好的。"}, {"s": 621.54, "e": 624.49, "t": "-All right, my friend. -Yeah, take care. All the best.", "zh": "-好吧，我的朋友。 -是的，保重。一切顺利。"}, {"s": 624.56, "e": 630.47, "t": "All right, this place is fantastic, Mamma Llama Eatery.", "zh": "好吧，这个地方太棒了，Mamma Llama Eatery。"}, {"s": 630.53, "e": 632.76, "t": "-Yeah, take care, guys. -Yeah, all right.", "zh": "-是的，保重，伙计们。 -是的，好吧。"}, {"s": 632.83, "e": 634.37, "t": "If you're in Weaverville", "zh": "如果您在韦弗维尔"}, {"s": 634.93, "e": 636.38, "t": "get the homemade cookies.", "zh": "买自制的饼干。"}, {"s": 636.88, "e": 637.72, "t": "Okay.", "zh": "好的。"}, {"s": 638.68, "e": 640.93, "t": "Here's what prices look like in the region.", "zh": "以下是该地区的价格情况。"}, {"s": 641.97, "e": 643.75, "t": "$400,000 for that cabin.", "zh": "那间小屋价值 40 万美元。"}, {"s": 644.77, "e": 647.86, "t": "$275,000 for that three bed, one point five bath.", "zh": "三张床、一点五浴室的价格为 275,000 美元。"}, {"s": 648.65, "e": 653.54, "t": "2,200 square feet, 2.9 acres, $459,000.", "zh": "2,200 平方英尺，2.9 英亩，459,000 美元。"}, {"s": 654.27, "e": 656.16, "t": "So depending on where you're from", "zh": "所以取决于你来自哪里"}, {"s": 657.33, "e": 660.38, "t": "that's either cheap or expensive.", "zh": "那要么便宜要么贵。"}, {"s": 662.64, "e": 667.09, "t": "From the urban parts of the state this is a true value", "zh": "从该州的城市部分来看，这是一个真正的价值"}, {"s": 667.16, "e": 670.32, "t": "but there are no jobs most likely or very few.", "zh": "但没有最有可能的工作或很少有工作。"}, {"s": 671.9, "e": 676.56, "t": "Seperate ownership external spiral staircases.", "zh": "独立所有权外部螺旋楼梯。"}, {"s": 677.21, "e": 679.45, "t": "Cool architectural details here.", "zh": "这里很酷的建筑细节。"}, {"s": 681.76, "e": 683.0, "t": "We have Diggin's.", "zh": "我们有迪金的。"}, {"s": 684.48, "e": 685.8, "t": "-How you guys doing? -Good.", "zh": "-你们好吗？ -好的。"}, {"s": 685.87, "e": 688.88, "t": "I'm just making a video of Weaverville. Is this a cool place?", "zh": "我只是在制作韦弗维尔的视频。这是一个很酷的地方吗？"}, {"s": 688.95, "e": 692.14, "t": "Yeah, this whole building's been here since 1856.", "zh": "是的，整栋建筑自 1856 年以来就一直在这里。"}, {"s": 692.21, "e": 693.21, "t": "-What was it?", "zh": "-那是什么？"}, {"s": 693.28, "e": 696.1, "t": "-What was this before? A bank? -Yeah, a a bank.", "zh": "-这之前是什么？银行？ -是的，一家银行。"}, {"s": 696.16, "e": 697.0, "t": "That's cool.", "zh": "这很酷。"}, {"s": 697.07, "e": 698.67, "t": "-It's been a bar since the '50s.", "zh": "-自 50 年代以来一直是一家酒吧。"}, {"s": 698.74, "e": 701.4, "t": "-You guys from town? -'Round here, yeah.", "zh": "-你们是城里来的吗？ -'就在这儿，是的。"}, {"s": 701.47, "e": 704.25, "t": "What's going on out here other than a beautiful town?", "zh": "除了美丽的小镇之外，这里还发生了什么？"}, {"s": 704.94, "e": 709.08, "t": "Nothing really, just a bunch of rednecks and logging really.", "zh": "其实没什么，只是一群乡巴佬和伐木工。"}, {"s": 709.14, "e": 711.2, "t": "-Is logging still happening? -Oh, yeah.", "zh": "- 日志记录还在发生吗？ -哦，是的。"}, {"s": 711.27, "e": 713.31, "t": "The mills right down there.", "zh": "磨坊就在那里。"}, {"s": 713.38, "e": 714.72, "t": "-Oh, really? -Yeah.", "zh": "-哦真的吗？ -是的。"}, {"s": 714.79, "e": 717.6, "t": "-They're still hiring people? -Oh, yeah. Oh, yeah.", "zh": "-他们还在招人吗？ -哦，是的。哦，是的。"}, {"s": 717.67, "e": 721.45, "t": "Other than working for Caltrans, like, you know, the highways.", "zh": "除了为加州交通局工作外，就像你知道的，在高速公路上工作。"}, {"s": 721.52, "e": 723.83, "t": "That's probably the best local job.", "zh": "这可能是当地最好的工作了。"}, {"s": 723.9, "e": 726.51, "t": "-Okay what do they pay do you think to start there?", "zh": "-好吧，你认为他们要付多少钱才能开始？"}, {"s": 727.01, "e": 729.54, "t": "Probably at least between 18 to 22.", "zh": "可能至少在 18 到 22 之间。"}, {"s": 729.61, "e": 731.61, "t": "-And that means you're out in the forest?", "zh": "-这意味着你在森林里？"}, {"s": 731.68, "e": 733.34, "t": "-No, no that's at the mill. -Okay.", "zh": "-不，不，那是在工厂。 -好的。"}, {"s": 733.41, "e": 736.46, "t": "That's actually working at the mill not out there logging.", "zh": "这实际上是在工厂工作，而不是在外面伐木。"}, {"s": 736.52, "e": 739.05, "t": "Those are all private companies that feed the mill.", "zh": "这些都是为工厂提供原料的私营公司。"}, {"s": 739.12, "e": 740.04, "t": "-Okay.", "zh": "-好的。"}, {"s": 740.1, "e": 744.12, "t": "So bringing in the logs and the mill's cutting down boards, everything like that.", "zh": "所以引进原木和工厂的切割板，诸如此类的东西。"}, {"s": 744.19, "e": 746.34, "t": "-And the mill's privately owned? -Yeah.", "zh": "-工厂是私营的吗？ -是的。"}, {"s": 747.13, "e": 749.6, "t": "So it's important for the community having that?", "zh": "那么拥有它对于社区来说很重要吗？"}, {"s": 749.67, "e": 750.74, "t": "-Huge. -Huge?", "zh": "-巨大的。 -巨大的？"}, {"s": 750.81, "e": 754.27, "t": "If the mill went down like that's why the Hayfork's a ghost town.", "zh": "如果磨坊像这样倒塌，那么海福克就会成为一座鬼城。"}, {"s": 754.33, "e": 755.5, "t": "Hayfork's a ghost town.", "zh": "海福克是一座鬼城。"}, {"s": 755.57, "e": 758.36, "t": "The only thing I kept Hayfork alive to this day is weed.", "zh": "直到今天，我唯一让海福克活着的东西就是杂草。"}, {"s": 758.42, "e": 763.33, "t": "After the mill shut down, Weaverville's mill's all we got in Trinity.", "zh": "工厂关闭后，我们在三一城就只剩下韦弗维尔的工厂了。"}, {"s": 763.4, "e": 765.55, "t": "The mill shut down, then the town shut down?", "zh": "工厂关闭了，然后城镇也关闭了？"}, {"s": 765.62, "e": 767.17, "t": "-Yeah, for the most part. -Okay.", "zh": "-是的，大部分情况下。 -好的。"}, {"s": 767.24, "e": 768.95, "t": "It dwindled down, that's for sure.", "zh": "减少了，这是肯定的。"}, {"s": 769.01, "e": 771.45, "t": "-That was a long time ago. -You grew up here?", "zh": "-那是很久以前的事了。 -你是在这里长大的？"}, {"s": 771.52, "e": 773.8, "t": "-No, I'm from Nebraska. -Whoa.", "zh": "-不，我来自内布拉斯加州。 -哇哦。"}, {"s": 773.87, "e": 775.32, "t": "Well got you out here?", "zh": "好吧，把你带出去了吗？"}, {"s": 775.82, "e": 776.67, "t": "Cannabis.", "zh": "大麻。"}, {"s": 778.52, "e": 780.81, "t": "Well, that business isn't so good right now.", "zh": "嗯，现在生意不太好。"}, {"s": 780.88, "e": 783.34, "t": "-Hell no. It's gone. -It's gone?", "zh": "-天哪，不。它消失了。 -消失了？"}, {"s": 783.41, "e": 785.77, "t": "That's one thing that kept this town alive.", "zh": "这是让这个小镇保持活力的一件事。"}, {"s": 785.84, "e": 789.35, "t": "I mean, up until California made it recreational for the whole state.", "zh": "我的意思是，直到加州将其变成全州的娱乐活动。"}, {"s": 789.42, "e": 791.23, "t": "if you had to be 21, just go buy it.", "zh": "如果你必须21岁，就去买吧。"}, {"s": 791.29, "e": 792.95, "t": "We had people all over the world.", "zh": "我们的员工遍布世界各地。"}, {"s": 793.02, "e": 795.93, "t": "Our little 3,000 people town,", "zh": "我们这个只有 3,000 人的小镇，"}, {"s": 796.0, "e": 800.16, "t": "we'd have 45,000 people from around the world coming here to trim weed.", "zh": "我们有 45,000 名来自世界各地的人来这里除草。"}, {"s": 800.23, "e": 802.84, "t": "-Trimigrants, that's what we call them. -Trimigrants?", "zh": "-三移民，我们就是这么称呼他们的。 -三流移民？"}, {"s": 802.9, "e": 804.65, "t": "They would get their 90 day visas,", "zh": "他们将获得 90 天的签证，"}, {"s": 804.72, "e": 807.04, "t": "come out here to Humboldt, and just trim weed.", "zh": "到洪堡这里来，修剪一下杂草。"}, {"s": 807.11, "e": 810.38, "t": "Go back to wherever, France, I met people all around the world.", "zh": "回到法国，我遇到了世界各地的人们。"}, {"s": 810.45, "e": 812.58, "t": "-Okay, so you had a lot of Europeans come?", "zh": "-好吧，所以有很多欧洲人来了？"}, {"s": 812.65, "e": 817.37, "t": "And then South Americans, Chile, Argentina, France, Spain.", "zh": "然后是南美、智利、阿根廷、法国、西班牙。"}, {"s": 817.44, "e": 820.25, "t": "-The trimigrant gets the 90 day visa, comes and works.", "zh": "- 移民获得 90 天签证，来工作。"}, {"s": 820.31, "e": 821.75, "t": "-And then it goes back home.", "zh": "-然后它就回家了。"}, {"s": 821.81, "e": 823.87, "t": "-Makes a bunch of money, goes home? -Yeah.", "zh": "-赚了一大笔钱，回家吗？ -是的。"}, {"s": 823.94, "e": 827.44, "t": "-But no longer? -No, it's dying now.", "zh": "-但是不再了？ -不，它现在快要死了。"}, {"s": 827.5, "e": 831.23, "t": "-If the economy is hurting, why does the town look so nice?", "zh": "-如果经济不景气，为什么这个小镇看起来这么好？"}, {"s": 831.29, "e": 832.65, "t": "It looks really nice here.", "zh": "这里看起来真的很不错。"}, {"s": 832.71, "e": 834.8, "t": "It's been this way, it hasn't changed.", "zh": "一直都是这样，没有改变。"}, {"s": 834.87, "e": 838.09, "t": "All this brick is the same brick since the 1800s.", "zh": "所有这些砖都是 1800 年代以来的同一块砖。"}, {"s": 838.16, "e": 841.21, "t": "-These were like brothels, and bars, and hotels.", "zh": "-这些就像妓院、酒吧和酒店。"}, {"s": 841.28, "e": 843.19, "t": "-Was that a brothel? -Yeah.", "zh": "-那是妓院吗？ -是的。"}, {"s": 843.26, "e": 847.04, "t": "This was the New York Saloon, one of the oldest places here.", "zh": "这是纽约沙龙，这里最古老的地方之一。"}, {"s": 847.1, "e": 848.78, "t": "Yeah, this was all the gold rush.", "zh": "是的，这就是淘金热。"}, {"s": 848.85, "e": 851.26, "t": "This was formed by the gold rush back in the day.", "zh": "这是由当时的淘金热形成的。"}, {"s": 851.33, "e": 853.38, "t": "-This is your ride? -Yep, I'm out of here.", "zh": "-这是你的座驾吗？ -是的，我要离开这里。"}, {"s": 853.45, "e": 854.7, "t": "-What's your name? -Bret.", "zh": "-你叫什么名字？ -布雷特。"}, {"s": 854.77, "e": 856.33, "t": "-Bret, Peter. -Nice to meet you.", "zh": "-布雷特，彼得。 -很高兴见到你。"}, {"s": 856.4, "e": 858.19, "t": "Enjoy our beautiful little town.", "zh": "享受我们美丽的小镇。"}, {"s": 858.26, "e": 859.95, "t": "Thanks, Bret, all the best.", "zh": "谢谢，布雷特，祝一切顺利。"}, {"s": 861.27, "e": 862.24, "t": "What a cool place.", "zh": "多么酷的地方啊。"}, {"s": 862.31, "e": 864.81, "t": "Guys, just been here a few minutes, really", "zh": "伙计们，刚刚来了几分钟，真的"}, {"s": 864.88, "e": 868.16, "t": "and got right into conversation.", "zh": "并立即开始交谈。"}, {"s": 868.23, "e": 869.51, "t": "People are friendly.", "zh": "人们很友好。"}, {"s": 872.19, "e": 874.95, "t": "We have the hydraulic monitor or giant", "zh": "我们有液压监视器或巨人"}, {"s": 876.0, "e": 880.48, "t": "Fisher-Patton 1870 used at Bloss McClary Mine.", "zh": "Bloss McClary 矿使用的 Fisher-Patton 1870。"}, {"s": 881.45, "e": 886.9, "t": "And so they would set up these hydraulic giants, as they say,", "zh": "所以他们会建立这些液压巨人，正如他们所说，"}, {"s": 887.82, "e": 892.92, "t": "and blast the water into the side of the mountain.", "zh": "并将水喷射到山边。"}, {"s": 894.21, "e": 897.43, "t": "And pull away the dirt and out would come the gold.", "zh": "除去泥土，金子就会出来。"}, {"s": 897.5, "e": 899.26, "t": "I believe that's how that worked.", "zh": "我相信这就是它的运作方式。"}, {"s": 900.22, "e": 903.55, "t": "It was because of that gold the money trickled down,", "zh": "正是因为有了黄金，钱才流下来，"}, {"s": 904.24, "e": 909.05, "t": "created a town with nice architecture and a thriving economy", "zh": "创建了一个拥有精美建筑和繁荣经济的城镇"}, {"s": 909.11, "e": 913.79, "t": "gun fights, brothels, all sorts of wildness back in the day.", "zh": "枪战、妓院，以及过去的各种狂野行为。"}, {"s": 923.87, "e": 925.05, "t": "Oh, wrong day.", "zh": "噢，错误的日子。"}, {"s": 931.53, "e": 934.07, "t": "-I have two lemon zucchini breads left. -Okay.", "zh": "-我还剩下两个柠檬西葫芦面包。 -好的。"}, {"s": 934.14, "e": 937.27, "t": "-Do you mind, I'm making a video on Trinity County?", "zh": "-你介意吗，我正在制作一个关于三一县的视频？"}, {"s": 937.34, "e": 939.38, "t": "-Oh well-- -Are you from here?", "zh": "-哦，好吧-- -你是这里人吗？"}, {"s": 939.44, "e": 941.58, "t": "Yeah, I live in Poker Bar. Yeah.", "zh": "是的，我住在扑克吧。是的。"}, {"s": 941.65, "e": 943.3, "t": "Poker Bar Farms Bakery.", "zh": "扑克吧农场面包店。"}, {"s": 943.37, "e": 945.75, "t": "-Uh oh, my sign. -Okay.", "zh": "-呃哦，我的标志。 -好的。"}, {"s": 947.67, "e": 949.94, "t": "-So this is your bakery? -Yeah.", "zh": "-这就是你的面包店吗？ -是的。"}, {"s": 950.57, "e": 953.64, "t": "This is the farmer's market location right here.", "zh": "这是农贸市场的位置。"}, {"s": 953.71, "e": 954.55, "t": "-Okay.", "zh": "-好的。"}, {"s": 954.62, "e": 959.16, "t": "At the Meadow and we have like it stops in mid-October.", "zh": "在草地上，我们好像十月中旬就停止了。"}, {"s": 959.22, "e": 960.08, "t": "-Okay.", "zh": "-好的。"}, {"s": 960.15, "e": 962.01, "t": "-And I just almost sold out.", "zh": "-我几乎卖完了。"}, {"s": 962.08, "e": 963.16, "t": "I make Greek stuff.", "zh": "我做希腊东西。"}, {"s": 963.23, "e": 964.57, "t": "I make baklava.", "zh": "我做果仁蜜饼。"}, {"s": 965.29, "e": 967.92, "t": "-Oh cool. -This is milopita, it's apple.", "zh": "-哦，酷。 -这是milopita，这是苹果。"}, {"s": 967.99, "e": 970.54, "t": "I just had a cookie, but I'm gonna have to try this.", "zh": "我刚吃了一块饼干，但我得尝尝这个。"}, {"s": 970.61, "e": 971.46, "t": "-Okay.", "zh": "-好的。"}, {"s": 971.52, "e": 972.95, "t": "-Can you hold this? -Yeah.", "zh": "-你能握住这个吗？ -是的。"}, {"s": 973.01, "e": 976.25, "t": "Here we go… milopita.", "zh": "我们开始……milopita。"}, {"s": 976.32, "e": 977.39, "t": "-Greek apple cake.", "zh": "- 希腊苹果蛋糕。"}, {"s": 978.22, "e": 979.5, "t": "-Homemade? -Of course.", "zh": "-自制？ -当然。"}, {"s": 979.57, "e": 980.94, "t": "-You make it? -Yeah.", "zh": "-你做到了吗？ -是的。"}, {"s": 983.39, "e": 984.52, "t": "Mm-hmm.", "zh": "嗯嗯。"}, {"s": 984.59, "e": 985.42, "t": "-Good?", "zh": "-好的？"}, {"s": 986.39, "e": 987.24, "t": "Fantastic.", "zh": "极好的。"}, {"s": 987.31, "e": 989.0, "t": "I make a lot of Greek…", "zh": "我做了很多希腊语......"}, {"s": 989.07, "e": 990.44, "t": "I'm half Greek, so.", "zh": "我有一半希腊血统，所以。"}, {"s": 990.51, "e": 993.24, "t": "-Look at that apple. Fresh apples. -Fresh apples.", "zh": "-看看那个苹果。新鲜的苹果。 -新鲜苹果。"}, {"s": 993.31, "e": 995.56, "t": "Actually, off trees in Lewiston.", "zh": "事实上，就在刘易斯顿的树下。"}, {"s": 995.63, "e": 997.5, "t": "-In Lewiston nearby? -Yeah.", "zh": "-在刘易斯顿附近吗？ -是的。"}, {"s": 998.9, "e": 1003.54, "t": "And I make baklava and the kourabiedes cookies.", "zh": "我做果仁蜜饼和 kourabiedes 饼干。"}, {"s": 1003.61, "e": 1005.62, "t": "Yeah, I'm the Greek baker.", "zh": "是的，我是希腊面包师。"}, {"s": 1006.35, "e": 1008.43, "t": "-So how are things in Weaverville?", "zh": "-韦弗维尔的情况怎么样？"}, {"s": 1008.5, "e": 1012.2, "t": "Well, we were just talking about how to come up with some great activities.", "zh": "好吧，我们只是在讨论如何开展一些很棒的活动。"}, {"s": 1012.27, "e": 1015.91, "t": "'cause that one gal in the black, she owns Yantra,", "zh": "因为那个穿黑衣服的女孩，她拥有 Yantra，"}, {"s": 1016.53, "e": 1021.13, "t": "and she can't open it 'cause she doesn't have a ADA compliant bathroom.", "zh": "她无法打开它，因为她没有符合 ADA 标准的浴室。"}, {"s": 1021.2, "e": 1022.04, "t": "-Oh.", "zh": "-哦。"}, {"s": 1022.11, "e": 1025.24, "t": "So she's thinking about like a private wine bar or something.", "zh": "所以她正在考虑开一家私人酒吧之类的。"}, {"s": 1025.31, "e": 1026.16, "t": "-Okay.", "zh": "-好的。"}, {"s": 1026.23, "e": 1029.59, "t": "But there's a lot of that, you know, all along the main street here.", "zh": "但你知道，这里的主要街道上有很多这样的东西。"}, {"s": 1029.65, "e": 1031.32, "t": "The first Saturday of every month", "zh": "每个月的第一个星期六"}, {"s": 1031.38, "e": 1034.38, "t": "they have an art walk and all businesses open.", "zh": "他们有艺术漫步，所有企业都开门营业。"}, {"s": 1034.45, "e": 1036.63, "t": "-I had no idea it would be so nice out here.", "zh": "-我没想到这里会这么好。"}, {"s": 1036.7, "e": 1037.66, "t": "Oh, it's beautiful.", "zh": "哦，很漂亮。"}, {"s": 1037.73, "e": 1041.36, "t": "-I thought Trinity County is technically the poorest county in the state.", "zh": "-我认为三一县严格来说是该州最贫穷的县。"}, {"s": 1041.42, "e": 1042.28, "t": "Yeah.", "zh": "是的。"}, {"s": 1042.35, "e": 1044.49, "t": "-So I thought it'd be all run down.", "zh": "-所以我以为一切都会破灭。"}, {"s": 1044.56, "e": 1047.94, "t": "No, the people are poor but they have a lot of volunteerism", "zh": "不，人们很穷，但他们有很多志愿服务"}, {"s": 1048.0, "e": 1050.44, "t": "and community groups that are real active.", "zh": "以及真正活跃的社区团体。"}, {"s": 1050.51, "e": 1051.36, "t": "-Okay.", "zh": "-好的。"}, {"s": 1051.43, "e": 1054.93, "t": "-I'm retired, but I do… -[both chuckle]", "zh": "-我退休了，但我…… -[都笑了]"}, {"s": 1055.0, "e": 1056.8, "t": "-That guy's fired up. -I know.", "zh": "-那家伙火了。 -我知道。"}, {"s": 1056.86, "e": 1059.27, "t": "He's been coming back and forth all day.", "zh": "他一整天都来来回回。"}, {"s": 1060.62, "e": 1063.56, "t": "-We know Trump won the election. -Yeah, so…", "zh": "-我们知道特朗普赢得了选举。 -是的，所以..."}, {"s": 1063.63, "e": 1065.41, "t": "But yeah, they have a lot of events", "zh": "但是，是的，他们有很多活动"}, {"s": 1065.47, "e": 1068.65, "t": "like they have the Salmon and Harvest Festival here.", "zh": "就像他们在这里举办鲑鱼和丰收节一样。"}, {"s": 1068.72, "e": 1071.08, "t": "They have events throughout the year for people", "zh": "他们全年为人们举办活动"}, {"s": 1071.15, "e": 1072.6, "t": "and they have a lot of music.", "zh": "他们有很多音乐。"}, {"s": 1072.66, "e": 1076.72, "t": "They have a lot of entertainment, very talented artists.", "zh": "他们有很多娱乐节目，有非常有才华的艺术家。"}, {"s": 1076.79, "e": 1079.48, "t": "We get tourism dollars come in.", "zh": "我们得到了旅游收入。"}, {"s": 1079.55, "e": 1081.79, "t": "I do a lot of Airbnb myself.", "zh": "我自己也做了很多 Airbnb 的事情。"}, {"s": 1081.86, "e": 1084.92, "t": "I'm busy all throughout the season.", "zh": "整个赛季我都很忙。"}, {"s": 1085.46, "e": 1088.08, "t": "It slows down in the fall but the fishermen", "zh": "秋天它的速度减慢了，但渔民"}, {"s": 1088.15, "e": 1091.32, "t": "are, you know, come all throughout the year", "zh": "你知道，全年都来"}, {"s": 1091.39, "e": 1094.2, "t": "for the fishing and it's good right now.", "zh": "钓鱼，现在很好。"}, {"s": 1100.68, "e": 1102.83, "t": "Let's check this place out of here.", "zh": "让我们离开这里检查一下这个地方。"}, {"s": 1105.78, "e": 1106.62, "t": "Hello, sir.", "zh": "你好先生。"}, {"s": 1108.25, "e": 1110.98, "t": "-Pearson B. Redding came over from-- -Yeah.", "zh": "-皮尔森·B·雷丁 (Pearson B. Redding) 来自-- -是的。"}, {"s": 1112.26, "e": 1114.12, "t": "This guy right up here.", "zh": "这家伙就在这里。"}, {"s": 1114.19, "e": 1116.44, "t": "-This guy? -Yeah, that's Pearson B. Redding.", "zh": "-这个家伙？ -是的，那是皮尔逊·B·雷丁。"}, {"s": 1116.51, "e": 1118.7, "t": "Okay, so Redding is named after this guy?", "zh": "好吧，雷丁就是以这个人的名字命名的？"}, {"s": 1118.76, "e": 1121.6, "t": "-Redding was originally going to be named after this guy.", "zh": "-雷丁最初是以这个人的名字命名的。"}, {"s": 1121.66, "e": 1122.89, "t": "-Reading. -Reading?", "zh": "-阅读。 -阅读？"}, {"s": 1122.95, "e": 1124.24, "t": "No, no.", "zh": "不，不。"}, {"s": 1124.3, "e": 1126.28, "t": "The English pronounce this as Redding.", "zh": "英语将其发音为 Redding。"}, {"s": 1126.35, "e": 1128.39, "t": "-We pronounce it reading. -I know.", "zh": "-我们发音为读音。 -我知道。"}, {"s": 1131.33, "e": 1134.2, "t": "I'm four-plus generations, Humboldt County.", "zh": "我已经四代多了，洪堡县。"}, {"s": 1134.27, "e": 1139.14, "t": "-So 1849, California Gold Rush, but it happened here, 1850.", "zh": "-1849 年，加州淘金热，但它发生在这里，1850 年。"}, {"s": 1139.7, "e": 1143.48, "t": "-Bunch of people moved from the East. -Yeah, from all over, basically.", "zh": "-一群人从东方搬来。 -是的，基本上来自各地。"}, {"s": 1143.54, "e": 1149.82, "t": "Kids who were growing up on farms too small in Indiana, you know, or Louisiana.", "zh": "你知道，在印第安纳州或路易斯安那州的农场里长大的孩子们太小了。"}, {"s": 1149.89, "e": 1152.44, "t": "The late 40s were economically tough,", "zh": "四十年代后期经济困难，"}, {"s": 1152.51, "e": 1154.76, "t": "not only in the United States, but in Europe.", "zh": "不仅在美国，而且在欧洲。"}, {"s": 1154.83, "e": 1158.33, "t": "It was a worldwide recession, not too deep, but felt everywhere.", "zh": "这是一场全球性的衰退，虽然不是太严重，但到处都有感觉。"}, {"s": 1158.96, "e": 1161.77, "t": "The sound of gold discovery in California in the media", "zh": "媒体报道加州发现金矿的声音"}, {"s": 1161.84, "e": 1163.68, "t": "brought people from a lot of places.", "zh": "从很多地方带来了人们。"}, {"s": 1163.75, "e": 1166.11, "t": "A lot of German names up in those pictures.", "zh": "这些照片里有很多德国名字。"}, {"s": 1166.18, "e": 1167.02, "t": "-Okay, yeah.", "zh": "-好吧，是的。"}, {"s": 1167.08, "e": 1170.19, "t": "-There were a lot of French came here, but virtually everybody.", "zh": "-有很多法国人来到这里，但几乎每个人都来这里。"}, {"s": 1170.26, "e": 1173.09, "t": "The year 1848 saw revolutions all across Europe", "zh": "1848 年，整个欧洲发生了革命"}, {"s": 1173.16, "e": 1175.78, "t": "and also a collapse of the French government.", "zh": "以及法国政府的崩溃。"}, {"s": 1175.85, "e": 1180.86, "t": "-So the French, the Germans, would hear of this in Europe, they'd get on a boat,", "zh": "-所以法国人、德国人会在欧洲听到这个消息，他们会上船，"}, {"s": 1180.93, "e": 1184.39, "t": "come over here, come to the east coast, then across the country?", "zh": "来这里，到东海岸，然后到全国各地？"}, {"s": 1184.46, "e": 1187.73, "t": "Some might've come across the country, some came around the horn.", "zh": "有些人可能穿越了整个国家，有些人则是急着赶来的。"}, {"s": 1187.8, "e": 1192.86, "t": "That is a sketch of Weaverville made in 1850, a charcoal sketch,", "zh": "那是 1850 年创作的韦弗维尔素描，木炭素描，"}, {"s": 1192.93, "e": 1198.35, "t": "and at that time it was a town made out of woodhouses, woods readily appropriable.", "zh": "那时，这是一个由木屋建成的城镇，树林很容易被占用。"}, {"s": 1198.94, "e": 1201.51, "t": "The major part of the wooden structure in the town", "zh": "小镇主体木结构"}, {"s": 1201.58, "e": 1203.61, "t": "was burned out by succession of fires", "zh": "被连续的火灾烧毁"}, {"s": 1203.68, "e": 1206.69, "t": "and merchants who got enough money rebuilt in brick.", "zh": "得到足够钱的商人用砖头重建。"}, {"s": 1206.76, "e": 1209.19, "t": "So all this historic district is brick up here.", "zh": "所以这里所有的历史街区都是砖砌的。"}, {"s": 1213.36, "e": 1215.39, "t": "in Europe or some of the most desperate?", "zh": "在欧洲还是一些最绝望的地方？"}, {"s": 1215.45, "e": 1218.99, "t": "-They were desperate and also the European education system", "zh": "-他们很绝望，欧洲的教育体系也很绝望"}, {"s": 1219.06, "e": 1221.1, "t": "functioned a lot differently, you know?", "zh": "功能有很大不同，你知道吗？"}, {"s": 1221.17, "e": 1224.67, "t": "Because you're talking about a society that has a denser population", "zh": "因为你谈论的是一个人口密集的社会"}, {"s": 1224.74, "e": 1228.65, "t": "than the mid-continent part of the US had and certainly the West.", "zh": "比美国中部大陆部分，当然还有西部地区的情况还要多。"}, {"s": 1228.71, "e": 1232.38, "t": "So these people were the successful ones.", "zh": "所以这些人都是成功的人。"}, {"s": 1232.45, "e": 1236.41, "t": "There's also a fair number of English, and Irish, and Scotch immigrants as well.", "zh": "还有相当数量的英国、爱尔兰和苏格兰移民。"}, {"s": 1236.48, "e": 1238.96, "t": "That's Jim that's obviously not German.", "zh": "那是吉姆，显然不是德国人。"}, {"s": 1239.03, "e": 1243.16, "t": "Lorenz, and he was the most prosperous hydraulic miner in the county.", "zh": "洛伦兹，他是该县最富有的水力矿工。"}, {"s": 1243.23, "e": 1244.7, "t": "-This guy? -Yeah.", "zh": "-这个家伙？ -是的。"}, {"s": 1244.77, "e": 1246.93, "t": "If you go on to Redding on California Street", "zh": "如果你继续前往加利福尼亚街的雷丁"}, {"s": 1247.0, "e": 1250.9, "t": "you'll see the Lorenz Hotel, a big three-story imposing brick hotel.", "zh": "您会看到洛伦兹酒店 (Lorenz Hotel)，这是一座宏伟的三层砖砌大酒店。"}, {"s": 1251.6, "e": 1255.46, "t": "So if it was gold at one time, timber still going to some degree,", "zh": "因此，如果它曾经是黄金，木材仍然会在某种程度上，"}, {"s": 1255.53, "e": 1256.37, "t": "it was pot.", "zh": "这是锅。"}, {"s": 1256.44, "e": 1259.8, "t": "-This is the Emerald Triangle? -Part of the Emerald Triangle.", "zh": "-这就是翡翠三角？ - 翡翠三角的一部分。"}, {"s": 1259.87, "e": 1261.57, "t": "With Humboldt and Mendocino County.", "zh": "包括洪堡县和门多西诺县。"}, {"s": 1261.64, "e": 1267.11, "t": "So back before 2016, before it became legalized for recreational use", "zh": "早在 2016 年之前，在娱乐用途合法化之前"}, {"s": 1267.61, "e": 1269.88, "t": "the small farms were all around here, correct?", "zh": "小农场都在这附近，对吗？"}, {"s": 1269.95, "e": 1273.23, "t": "-There were a lot of them. -Okay. Do you miss those days or no?", "zh": "-有很多。 -好的。你怀念那些日子吗？"}, {"s": 1273.8, "e": 1278.01, "t": "Well, I was never involved in that at all.", "zh": "嗯，我根本没有参与其中。"}, {"s": 1278.08, "e": 1280.5, "t": "-I was kind of-- -You didn't Inhale, that's good.", "zh": "-我有点-- -你没有吸气，那很好。"}, {"s": 1280.57, "e": 1282.25, "t": "-No. -[laughter]", "zh": "-不。 -[笑声]"}, {"s": 1282.31, "e": 1287.78, "t": "I came from a ranching family and we had Mexican cartel guys invade our place.", "zh": "我来自一个牧场家庭，墨西哥贩毒集团入侵了我们的家。"}, {"s": 1288.28, "e": 1289.9, "t": "-Really? What year? -Yeah.", "zh": "-真的吗？哪一年？ -是的。"}, {"s": 1289.97, "e": 1293.01, "t": "Early in the 2000s and…", "zh": "2000 年代初……"}, {"s": 1293.08, "e": 1295.16, "t": "-What do you mean they invaded your place?", "zh": "-他们入侵你的地方是什么意思？"}, {"s": 1295.23, "e": 1299.55, "t": "They trespassed and built a farm with about 20,000 plants.", "zh": "他们擅自闯入并建造了一个种植了约 20,000 株植物的农场。"}, {"s": 1299.61, "e": 1302.69, "t": "-And there's nothing you could do? -You have to find it first.", "zh": "-而你却无能为力？ -你必须先找到它。"}, {"s": 1302.76, "e": 1304.91, "t": "They're pretty good at hiding those things.", "zh": "他们非常擅长隐藏这些事情。"}, {"s": 1304.97, "e": 1308.62, "t": "And so I worked with the sheriff's office and we got rid of them.", "zh": "所以我与治安官办公室合作，我们摆脱了他们。"}, {"s": 1308.69, "e": 1312.47, "t": "They're still here, not the numbers they used to be, but they're still here.", "zh": "他们还在这里，虽然数量不再是以前的数量，但他们仍然在这里。"}, {"s": 1312.54, "e": 1315.15, "t": "-They're still growing? -They're still growing, yeah.", "zh": "-它们还在生长吗？ -他们还在成长，是的。"}, {"s": 1315.22, "e": 1318.68, "t": "-[man 2 ] In the back country? -[Peter] So way back there?", "zh": "-[男人2]在偏远地区？ -[彼得]那么回到那里？"}, {"s": 1318.75, "e": 1319.63, "t": "Yeah.", "zh": "是的。"}, {"s": 1319.7, "e": 1321.4, "t": "If you don't have local knowledge…", "zh": "如果您不了解当地情况..."}, {"s": 1321.47, "e": 1325.07, "t": "This is one of the 10 largest wilderness areas in the lower 48.", "zh": "这是美国 48 个州内 10 个最大的荒野地区之一。"}, {"s": 1325.14, "e": 1326.61, "t": "So about 600,000 acres.", "zh": "大约有60万英亩。"}, {"s": 1327.46, "e": 1329.45, "t": "I've been hiking there for 65 years", "zh": "我已经在那里徒步旅行了 65 年"}, {"s": 1329.52, "e": 1332.06, "t": "and I've been on top of almost every mountain", "zh": "我几乎登上过每一座山"}, {"s": 1332.13, "e": 1334.5, "t": "and seen almost all the lakes several times", "zh": "几乎所有的湖泊都看过好几次"}, {"s": 1334.57, "e": 1337.13, "t": "and there are places that I probably won't walk.", "zh": "还有一些地方我可能不会去。"}, {"s": 1339.26, "e": 1341.8, "t": "Humboldt Gulch would be a good example.", "zh": "洪堡峡谷就是一个很好的例子。"}, {"s": 1341.87, "e": 1344.94, "t": "They will move, they might be in a place for two years,", "zh": "他们会搬家，他们可能会在一个地方待两年，"}, {"s": 1345.01, "e": 1348.38, "t": "maybe only one year if they decide there's much traffic there.", "zh": "如果他们认为那里交通繁忙的话，也许只有一年。"}, {"s": 1348.45, "e": 1352.4, "t": "-And it's just because it's hard to really explain it unless you've been here.", "zh": "-这只是因为除非你来过这里否则很难真正解释它。"}, {"s": 1352.47, "e": 1353.96, "t": "It's so remote.", "zh": "实在是太遥远了。"}, {"s": 1354.03, "e": 1354.87, "t": "It's remote.", "zh": "这是远程的。"}, {"s": 1354.93, "e": 1358.73, "t": "And there's so much space between the towns but this is the California", "zh": "城镇之间有很大的空间，但这是加州"}, {"s": 1358.79, "e": 1361.9, "t": "most people don't think of when they hear California.", "zh": "大多数人一听到加利福尼亚州就不会想到它。"}, {"s": 1361.97, "e": 1365.24, "t": "They think of Yosemite and San Francisco", "zh": "他们想到优胜美地和旧金山"}, {"s": 1365.31, "e": 1368.6, "t": "LA, Disneyland, a few other things, that's it.", "zh": "洛杉矶、迪士尼乐园，还有其他一些东西，仅此而已。"}, {"s": 1370.43, "e": 1373.92, "t": "-They think San Francisco's Northern California till you get up here.", "zh": "-在你到达这里之前，他们认为旧金山是北加州。"}, {"s": 1373.98, "e": 1376.11, "t": "-San Franciscans always talk of themselves", "zh": "-旧金山人总是谈论自己"}, {"s": 1376.17, "e": 1377.66, "t": "as being Northern California", "zh": "作为北加州"}, {"s": 1377.73, "e": 1380.44, "t": "and we talk to them as being middle California.", "zh": "我们说他们是加州中部的人。"}, {"s": 1380.51, "e": 1381.34, "t": "Yeah.", "zh": "是的。"}, {"s": 1387.77, "e": 1393.2, "t": "I was thinking the main town in the poorest county of California", "zh": "我在想加州最贫穷县的主要城镇"}, {"s": 1393.76, "e": 1396.13, "t": "would be a little rougher, a little more beat up", "zh": "会更粗糙一点，更破烂一点"}, {"s": 1396.2, "e": 1398.9, "t": "but this is quite charming, quite beautiful,", "zh": "但这是相当迷人，相当美丽，"}, {"s": 1399.59, "e": 1402.76, "t": "and you never know what you're going to get into until you go.", "zh": "在你离开之前你永远不知道你会遇到什么。"}, {"s": 1402.83, "e": 1403.82, "t": "That's for sure.", "zh": "这是肯定的。"}, {"s": 1422.57, "e": 1424.84, "t": "-You've lived here for how long? -38 years.", "zh": "-你在这里住了多久了？ -38岁。"}, {"s": 1424.91, "e": 1428.14, "t": "Okay, so what's the story? What do the outsiders not know?", "zh": "好吧，那么故事是怎样的呢？外人不知道什么？"}, {"s": 1428.68, "e": 1430.78, "t": "We got a thing called Trinity County time.", "zh": "我们有一种叫做三一县时间的东西。"}, {"s": 1431.79, "e": 1432.77, "t": "We're all on it.", "zh": "我们都在努力。"}, {"s": 1434.21, "e": 1438.57, "t": "Everything's a little slower pace here than the people from the city.", "zh": "这里的一切节奏都比城里人慢一点。"}, {"s": 1438.63, "e": 1440.59, "t": "-Pretty tight community, would you say?", "zh": "-你会说社区非常紧密吗？"}, {"s": 1440.65, "e": 1442.95, "t": "It's getting back to that.", "zh": "又回到了这一点。"}, {"s": 1443.02, "e": 1446.33, "t": "They just started a community action committee type thing.", "zh": "他们刚刚开始了社区行动委员会类型的活动。"}, {"s": 1446.39, "e": 1448.29, "t": "So that's getting together", "zh": "这样就聚在一起了"}, {"s": 1448.35, "e": 1451.85, "t": "and they're going to try to start doing more events out here.", "zh": "他们将尝试在这里举办更多活动。"}, {"s": 1451.92, "e": 1454.67, "t": "So then we've got music going on down at the Moose now.", "zh": "那么我们现在在 Moose 上播放音乐。"}, {"s": 1454.73, "e": 1456.56, "t": "Yeah, music at the Moose.", "zh": "是的，驼鹿音乐厅的音乐。"}, {"s": 1456.63, "e": 1460.95, "t": "-So they say statistically it's the poorest county in the state", "zh": "-所以他们说从统计数据来看这是该州最贫穷的县"}, {"s": 1461.02, "e": 1463.45, "t": "but it doesn't feel or look that way though.", "zh": "但感觉或看起来并非如此。"}, {"s": 1463.52, "e": 1464.98, "t": "Driving through today.", "zh": "今天开车经过。"}, {"s": 1465.05, "e": 1468.81, "t": "You know, it's definitely lower.", "zh": "你知道，它肯定更低。"}, {"s": 1468.87, "e": 1471.23, "t": "-It looks way nicer than I thought it would.", "zh": "-它看起来比我想象的要好得多。"}, {"s": 1471.3, "e": 1474.31, "t": "-Like Weaverville's a charming place. -It's a charming place.", "zh": "- 就像韦弗维尔一样，这是一个迷人的地方。 -这是一个迷人的地方。"}, {"s": 1474.38, "e": 1476.61, "t": "-It used to be a lot more charming. -Really?", "zh": "-它曾经更加迷人。 -真的吗？"}, {"s": 1476.67, "e": 1477.51, "t": "Yeah.", "zh": "是的。"}, {"s": 1478.16, "e": 1480.44, "t": "-I thought it was clean and nice. -Oh man.", "zh": "-我认为它干净又漂亮。 -哦伙计。"}, {"s": 1480.51, "e": 1486.09, "t": "When I lived there in '97 is when I came out to Lewiston from Weaverville.", "zh": "97 年我从韦弗维尔 (Weaverville) 来到刘易斯顿 (Lewiston) 时就住在那里。"}, {"s": 1486.16, "e": 1489.48, "t": "And it was a lot more pristine even back then.", "zh": "即使在那时，它也更加原始。"}, {"s": 1489.54, "e": 1490.46, "t": "-Yeah. -Okay.", "zh": "-是的。 -好的。"}, {"s": 1490.53, "e": 1492.84, "t": "Are the young people staying in town?", "zh": "年轻人还留在城里吗？"}, {"s": 1492.91, "e": 1493.93, "t": "They all move.", "zh": "他们都动了。"}, {"s": 1494.0, "e": 1495.88, "t": "Most of the majority's moving.", "zh": "大多数人都在搬家。"}, {"s": 1495.95, "e": 1498.52, "t": "-They go to the cities? -Cities and stuff like that.", "zh": "-他们去城市吗？ -城市之类的东西。"}, {"s": 1498.59, "e": 1500.44, "t": "Some of them come back after a while.", "zh": "他们中的一些人过了一段时间就回来了。"}, {"s": 1500.51, "e": 1501.35, "t": "Yeah.", "zh": "是的。"}, {"s": 1501.42, "e": 1502.99, "t": "We're getting a lot more people", "zh": "我们的人数越来越多"}, {"s": 1503.06, "e": 1505.37, "t": "that are selling their homes in the Bay Area.", "zh": "正在出售他们在湾区的房屋。"}, {"s": 1505.43, "e": 1508.41, "t": "-We got a lot of retirees up here. -And then moving up here.", "zh": "-我们这里有很多退休人员。 -然后搬到这里。"}, {"s": 1508.48, "e": 1511.51, "t": "Because I mean for what they're selling down there. They can…", "zh": "因为我指的是他们在那里卖的东西。他们可以……"}, {"s": 1511.58, "e": 1513.96, "t": "-Yeah. -Yeah, it's crazy. [laughs]", "zh": "-是的。 -是的，这太疯狂了。 [笑]"}, {"s": 1514.02, "e": 1516.68, "t": "I worked for the County Behavioral Health for 20 years", "zh": "我在县行为健康中心工作了 20 年"}, {"s": 1516.75, "e": 1518.23, "t": "and then I retired.", "zh": "然后我就退休了。"}, {"s": 1518.3, "e": 1521.63, "t": "-Oh, you shouldn't retire. We need you. -[laughter]", "zh": "-哦，你不应该退休。我们需要你。 -[笑声]"}, {"s": 1521.69, "e": 1523.73, "t": "No, I don't want to go there anymore.", "zh": "不，我不想再去那里了。"}, {"s": 1523.79, "e": 1525.47, "t": "-You've done enough of that?", "zh": "-你已经做够了吗？"}, {"s": 1526.5, "e": 1529.86, "t": "I'm still a newcomer and I've opened the shop in '01.", "zh": "我还是个新人，01年就开店了。"}, {"s": 1529.93, "e": 1532.45, "t": "-Yeah, we're smi-natives. -Yeah. [laughs]", "zh": "-是的，我们是本地人。 -是的。 [笑]"}, {"s": 1532.52, "e": 1537.08, "t": "-Did the true natives embrace you easily or that was a long time to crack in?", "zh": "-真正的当地人很容易拥抱你还是需要很长时间才能融入？"}, {"s": 1537.15, "e": 1542.41, "t": "Yeah, it took a while, but, you know, then all those…", "zh": "是的，花了一段时间，但是，你知道，然后所有这些......"}, {"s": 1542.47, "e": 1545.67, "t": "If you go over to Hayfork it's kind of different.", "zh": "如果你去Hayfork，情况就会有所不同。"}, {"s": 1545.74, "e": 1548.48, "t": "-If you fix their car though, they probably like you.", "zh": "-如果你修理他们的车，他们可能会喜欢你。"}, {"s": 1548.55, "e": 1551.02, "t": "-You know, it's been good. -Yeah.", "zh": "-你知道，这很好。 -是的。"}, {"s": 1551.09, "e": 1552.19, "t": "Let's put it that way.", "zh": "这么说吧。"}, {"s": 1552.25, "e": 1554.24, "t": "-Cool. Where should I go in Lewiston?", "zh": "-凉爽的。刘易斯顿我应该去哪里？"}, {"s": 1555.11, "e": 1557.9, "t": "So there's not many places.", "zh": "所以地方不多。"}, {"s": 1557.97, "e": 1559.93, "t": "-There's some smokehouse, right?", "zh": "-有烟房，对吧？"}, {"s": 1560.0, "e": 1562.28, "t": "Smokehouse and talk to Jarret.", "zh": "熏制室并与贾勒特交谈。"}, {"s": 1562.35, "e": 1564.27, "t": "-Jarret? Okay. -Yeah, he's the owner.", "zh": "-杰瑞特？好的。 -是的，他是店主。"}, {"s": 1564.92, "e": 1567.74, "t": "If he's not there, what is it, Sean?", "zh": "如果他不在那儿，那是什么，肖恩？"}, {"s": 1567.81, "e": 1569.96, "t": "-He's like a manager or something. -Okay.", "zh": "-他就像一个经理什么​​的。 -好的。"}, {"s": 1570.03, "e": 1572.81, "t": "-It's a little smokehouse restaurant. -All right.", "zh": "-这是一家小烟熏餐厅。 -好的。"}, {"s": 1572.88, "e": 1575.18, "t": "Short red headed guy with a beard, that's Sean.", "zh": "留着胡子的红发矮个子，那是肖恩。"}, {"s": 1575.25, "e": 1576.53, "t": "-Yeah. -All right.", "zh": "-是的。 -好的。"}, {"s": 1576.6, "e": 1578.9, "t": "-Nice meeting you. -See you guys, thank you.", "zh": "-很高兴认识你。 -再见，谢谢你们。"}, {"s": 1584.22, "e": 1589.34, "t": "This is true small town feeling Americana.", "zh": "这是真正的美国小镇感觉。"}, {"s": 1601.11, "e": 1603.17, "t": "-He wanted to be here. -Oh, he knew? Okay.", "zh": "-他想来这里。 -哦，他知道？好的。"}, {"s": 1603.24, "e": 1605.81, "t": "He just got back into town from a grocery run.", "zh": "他刚刚从杂货店买完东西回到城里。"}, {"s": 1605.88, "e": 1607.79, "t": "-Did you grow up here? -No, I didn't.", "zh": "-你是在这里长大的吗？ -不，我没有。"}, {"s": 1607.85, "e": 1610.03, "t": "I was a transplant up here, I used to work…", "zh": "我是这里的移植者，我曾经工作过……"}, {"s": 1610.1, "e": 1612.87, "t": "I was a geographic information specialist.", "zh": "我是一名地理信息专家。"}, {"s": 1612.94, "e": 1614.84, "t": "-So a cartographer. -Okay.", "zh": "-所以是制图师。 -好的。"}, {"s": 1614.91, "e": 1617.09, "t": "And I was working doing CEQA documents", "zh": "我当时正在做CEQA 文件"}, {"s": 1617.16, "e": 1619.57, "t": "for a commercial cannabis consulting company", "zh": "为一家商业大麻咨询公司"}, {"s": 1619.63, "e": 1622.22, "t": "and then when the green boom crashed", "zh": "然后当绿色繁荣崩溃时"}, {"s": 1622.29, "e": 1625.61, "t": "I couldn't find work and so I started working here and I love it.", "zh": "我找不到工作，所以我开始在这里工作，我喜欢它。"}, {"s": 1625.67, "e": 1627.8, "t": "I've been working here for two years now.", "zh": "我已经在这里工作两年了。"}, {"s": 1627.87, "e": 1628.83, "t": "-Oh, wow. -Yeah.", "zh": "-哦，哇。 -是的。"}, {"s": 1628.89, "e": 1630.5, "t": "One of the pot refugees.", "zh": "大麻难民之一。"}, {"s": 1631.01, "e": 1632.81, "t": "-Are there a lot of you guys? -Yeah.", "zh": "-你们人很多吗？ -是的。"}, {"s": 1632.88, "e": 1635.01, "t": "-Pot refugees? -Oh yeah, there's a lot.", "zh": "-大麻难民？ -哦，是的，有很多。"}, {"s": 1635.08, "e": 1637.89, "t": "When the farms all kinda crashed, they went out.", "zh": "当农场都崩溃了时，他们就出去了。"}, {"s": 1637.95, "e": 1638.79, "t": "-Yep.", "zh": "-是的。"}, {"s": 1638.85, "e": 1642.87, "t": "So here in Trinity, just in Lewiston there used to be probably 30 farms", "zh": "所以，在 Trinity，就在 Lewiston，曾经大约有 30 个农场"}, {"s": 1642.93, "e": 1647.12, "t": "and then they had anywhere from five to ten guys that worked for them.", "zh": "然后他们有五到十个人为他们工作。"}, {"s": 1647.19, "e": 1650.4, "t": "So you had a lot of people left the county after that", "zh": "所以在那之后有很多人离开了这个县"}, {"s": 1650.46, "e": 1652.01, "t": "'cause when that went away…", "zh": "因为当它消失后……"}, {"s": 1652.08, "e": 1656.01, "t": "So it was on a downward trend and now it's tourism that keeps the places going.", "zh": "所以它一直呈下降趋势，现在是旅游业让这些地方继续发展。"}, {"s": 1656.08, "e": 1657.43, "t": "-So it was better-- -Hey.", "zh": "-所以这样更好-- -嘿。"}, {"s": 1657.49, "e": 1659.29, "t": "-How you doing? Peter. -Jarret.", "zh": "-你好吗？彼得. -杰瑞特。"}, {"s": 1659.36, "e": 1661.93, "t": "-He's the boss man. -Oh cool, this is your business?", "zh": "- 他是老板。 -哦，酷，这是你的事吗？"}, {"s": 1662.0, "e": 1663.09, "t": "-Yes. -Nice.", "zh": "-是的。 -好的。"}, {"s": 1663.16, "e": 1665.44, "t": "I'm just getting your take on Trinity County.", "zh": "我只是了解您对三一县的看法。"}, {"s": 1665.51, "e": 1667.82, "t": "I'm doing a video on Trinity, cruising through.", "zh": "我正在制作一个关于 Trinity 的视频，正在浏览。"}, {"s": 1667.88, "e": 1669.74, "t": "I love Trinity County, super chill.", "zh": "我喜欢三一县，超级寒冷。"}, {"s": 1669.81, "e": 1671.01, "t": "-Super chill? -Yeah.", "zh": "-超级冷？ -是的。"}, {"s": 1671.08, "e": 1673.25, "t": "You guys feel removed, left alone out here?", "zh": "你们感到被孤立，被孤身一人留在这儿吗？"}, {"s": 1673.32, "e": 1676.08, "t": "Absolutely, you're in the county 40 miles from the city.", "zh": "当然，您在距离城市 40 英里的县城。"}, {"s": 1676.14, "e": 1678.56, "t": "This is a sweet setup, can I take a video of it?", "zh": "这个设置太棒了，我可以拍个视频吗？"}, {"s": 1678.62, "e": 1680.56, "t": "-Yeah, man. -Where are you taking this?", "zh": "-是的，伙计。 -你要把这个带到哪里？"}, {"s": 1680.62, "e": 1682.75, "t": "I do the archery tournament in Redding.", "zh": "我在雷丁参加射箭比赛。"}, {"s": 1682.82, "e": 1685.19, "t": "I do Heather's Fair, Hayforks Fair,", "zh": "我参加希瑟集市、海福克斯集市、"}, {"s": 1685.25, "e": 1687.05, "t": "Down River Kayak Races.", "zh": "顺流皮划艇比赛。"}, {"s": 1687.88, "e": 1691.89, "t": "The Fourth of July, I do the VIP tent, Fourth of July for the rodeo.", "zh": "七月四日，我做贵宾帐篷，七月四日进行牛仔竞技表演。"}, {"s": 1691.96, "e": 1693.37, "t": "-Nice. How's business?", "zh": "-好的。生意怎么样？"}, {"s": 1693.87, "e": 1694.83, "t": "Business is good.", "zh": "生意很好。"}, {"s": 1694.9, "e": 1696.89, "t": "Bar social media blew up two years ago", "zh": "酒吧社交媒体两年前炸毁"}, {"s": 1696.96, "e": 1698.42, "t": "and we've just been slamming.", "zh": "我们刚刚一直在猛击。"}, {"s": 1698.49, "e": 1699.45, "t": "-Right on. -Yeah.", "zh": "-就在。 -是的。"}, {"s": 1699.52, "e": 1701.03, "t": "Sasquatch, you believe in him?", "zh": "大脚野人，你相信他吗？"}, {"s": 1701.1, "e": 1701.93, "t": "Sure.", "zh": "当然。"}, {"s": 1702.0, "e": 1704.22, "t": "-That's a legend up there in the sticks?", "zh": "-这就是传说中的传说吗？"}, {"s": 1704.29, "e": 1707.12, "t": "I'm from South Carolina so we ain't got many Sasquatches.", "zh": "我来自南卡罗来纳州，所以我们没有很多大脚野人。"}, {"s": 1707.19, "e": 1709.57, "t": "Okay, how is it here compared to South Carolina?", "zh": "好的，这里与南卡罗来纳州相比怎么样？"}, {"s": 1709.64, "e": 1712.86, "t": "So where I grew up in South Carolina is almost identical to this.", "zh": "所以我在南卡罗来纳州长大的地方几乎与此相同。"}, {"s": 1712.92, "e": 1714.4, "t": "-Seriously? -Almost identical.", "zh": "-严重地？ - 几乎一模一样。"}, {"s": 1714.47, "e": 1716.05, "t": "-The community? -Mountain town.", "zh": "-社区？ -山城。"}, {"s": 1716.12, "e": 1719.18, "t": "Actually my community was smaller than this in South Carolina.", "zh": "事实上，我的社区比南卡罗来纳州的这个要小。"}, {"s": 1719.25, "e": 1723.99, "t": "We were farm but just the layout. I was 40 miles from the city.", "zh": "我们是农场，但只是布局。我距市区 40 英里。"}, {"s": 1724.59, "e": 1727.63, "t": "A lot of people who live here never have gone anywhere", "zh": "很多住在这里的人从来没有去过任何地方"}, {"s": 1728.15, "e": 1729.39, "t": "outside of California.", "zh": "加利福尼亚州以外。"}, {"s": 1729.46, "e": 1733.59, "t": "They've never been outside California, never been to the city, never been to LA.", "zh": "他们从未离开过加利福尼亚州，从未去过城市，也从未去过洛杉矶。"}, {"s": 1733.65, "e": 1735.74, "t": "Like straight up, they're country kids.", "zh": "说实话，他们都是乡下孩子。"}, {"s": 1736.39, "e": 1740.18, "t": "They ride horses, and motorcycles, and rodeo, and sh*t.", "zh": "他们骑马、摩托车、牛仔竞技等等。"}, {"s": 1740.24, "e": 1742.57, "t": "-Right so that-- -[laughing] Straight up, yeah.", "zh": "- 是这样-- -[笑] 直接说吧，是的。"}, {"s": 1742.64, "e": 1747.29, "t": "That would be a cultural collision dropping these guys into Downtown LA?", "zh": "将这些人扔到洛杉矶市中心会造成文化冲突吗？"}, {"s": 1747.36, "e": 1749.7, "t": "They'd have no idea what to do, yeah.", "zh": "他们不知道该怎么办，是的。"}, {"s": 1749.77, "e": 1752.39, "t": "-They don't want to go and I get it. -Yeah.", "zh": "-他们不想去，我明白。 -是的。"}, {"s": 1752.45, "e": 1755.52, "t": "I got in the military, and I got out, and went to San Diego.", "zh": "我参军，退伍后去了圣地亚哥。"}, {"s": 1755.59, "e": 1757.75, "t": "-You know what I'm saying? I got out. -Okay.", "zh": "-你知道我在说什么吗？我下了车。 -好的。"}, {"s": 1757.82, "e": 1760.42, "t": "'Cause I wanted to experience life.", "zh": "因为我想体验生活。"}, {"s": 1760.49, "e": 1762.51, "t": "-But I think from the outside", "zh": "-但我认为从外部来看"}, {"s": 1762.57, "e": 1765.84, "t": "in South Carolina nobody knows Trinity County or how remote it is.", "zh": "在南卡罗来纳州，没有人知道三一县或它有多偏远。"}, {"s": 1765.91, "e": 1767.03, "t": "No, they have no idea.", "zh": "不，他们不知道。"}, {"s": 1767.1, "e": 1771.16, "t": "And so they don't understand like a good chunk of California,", "zh": "所以他们不像加州的大部分人那样理解，"}, {"s": 1771.23, "e": 1772.76, "t": "maybe the majority is rural.", "zh": "也许大多数是农村人。"}, {"s": 1772.82, "e": 1773.68, "t": "Oh yeah.", "zh": "哦，是的。"}, {"s": 1773.75, "e": 1776.15, "t": "How many sheriff's and cop cars have you seen?", "zh": "你见过多少辆警车和警车？"}, {"s": 1776.91, "e": 1779.15, "t": "Saw one at town, Weaverville.", "zh": "在韦弗维尔镇看到了一个。"}, {"s": 1779.76, "e": 1780.59, "t": "Yeah.", "zh": "是的。"}, {"s": 1780.66, "e": 1782.63, "t": "-CHP probably. -How are they? They good?", "zh": "- 可能是热电联产。 -他们怎么样？他们好吗？"}, {"s": 1782.7, "e": 1785.51, "t": "Yeah, our cops are good. I love our sheriff's department.", "zh": "是的，我们的警察很好。我喜欢我们的治安部门。"}, {"s": 1785.57, "e": 1787.14, "t": "This is… Lewis is remote.", "zh": "这是……刘易斯很遥远。"}, {"s": 1787.21, "e": 1788.65, "t": "So, there's not a lot here.", "zh": "所以，这里没有太多。"}, {"s": 1789.4, "e": 1792.44, "t": "In a little mountain town, you better have three businesses.", "zh": "在一个小山城，你最好拥有三项生意。"}, {"s": 1792.51, "e": 1794.65, "t": "-Why? -Because there's no money.", "zh": "-为什么？ -因为没有钱。"}, {"s": 1794.72, "e": 1796.67, "t": "So, we have the market and we have this.", "zh": "所以，我们有市场，我们有这个。"}, {"s": 1796.74, "e": 1800.24, "t": "My wife runs an early head start daycare out of our house.", "zh": "我的妻子在我们家经营着一个早期的托儿所。"}, {"s": 1801.01, "e": 1801.88, "t": "So…", "zh": "所以……"}, {"s": 1801.94, "e": 1804.2, "t": "-Is it hard to run businesses here these days?", "zh": "-现在在这里做生意很难吗？"}, {"s": 1805.05, "e": 1807.37, "t": "So, hunting season ended last Sunday", "zh": "所以，狩猎季节于上周日结束"}, {"s": 1807.45, "e": 1810.64, "t": "and we are now in wintertime money, which is not much", "zh": "而我们现在正值冬季，钱不多"}, {"s": 1811.23, "e": 1813.72, "t": "but starting in March, we'll pick back up.", "zh": "但从三月份开始，我们将恢复活力。"}, {"s": 1813.79, "e": 1817.15, "t": "I do a 12-week street run of no breaks starting May", "zh": "从五月开始我会进行为期 12 周不间断的街头跑步"}, {"s": 1817.78, "e": 1818.79, "t": "No breaks.", "zh": "没有休息。"}, {"s": 1818.86, "e": 1820.99, "t": "Every weekend I'm somewhere doing something", "zh": "每个周末我都在某个地方做某事"}, {"s": 1821.06, "e": 1824.46, "t": "I private chef for a month at a fishing camp.", "zh": "我在钓鱼营做了一个月的私人厨师。"}, {"s": 1824.53, "e": 1827.74, "t": "-So you just make her while it's here and then you got to bank up", "zh": "-所以你只要趁它还在这里的时候让她，然后你就得存钱"}, {"s": 1827.81, "e": 1829.94, "t": "and then that rides you through the winter?", "zh": "然后它会带你度过冬天吗？"}, {"s": 1830.0, "e": 1831.23, "t": "Absolutely, you have to.", "zh": "绝对，你必须这样做。"}, {"s": 1831.3, "e": 1834.54, "t": "I do catering Saturday and just Christmas parties.", "zh": "我周六做餐饮，只做圣诞派对。"}, {"s": 1835.26, "e": 1838.9, "t": "That's what makes enough money to pay the employees 'cause we stay open.", "zh": "这就是我们能赚到足够的钱来支付员工工资的原因，因为我们保持营业。"}, {"s": 1839.59, "e": 1841.8, "t": "Tacos are my number one seller for the year.", "zh": "玉米饼是我今年销量第一的玉米饼。"}, {"s": 1841.87, "e": 1842.7, "t": "-Okay.", "zh": "-好的。"}, {"s": 1842.77, "e": 1845.56, "t": "And then the mountain philly is right behind that", "zh": "然后费城山就在后面"}, {"s": 1845.63, "e": 1847.05, "t": "and then the pulled pork,", "zh": "然后是手撕猪肉，"}, {"s": 1847.12, "e": 1849.26, "t": "and depending on the day of the week, man,", "zh": "取决于一周中的哪一天，伙计，"}, {"s": 1849.32, "e": 1853.89, "t": "I might sell out of 25, 30 pounds of pastrami just making reubans.", "zh": "我可能会卖掉 25、30 磅的熏牛肉来制作鲁班。"}, {"s": 1853.96, "e": 1856.8, "t": "It's great 'cause it's our own little twist.", "zh": "这很棒，因为这是我们自己的小改动。"}, {"s": 1856.87, "e": 1859.47, "t": "We use a slaw sauce, Carolina mustard barbecue sauce.", "zh": "我们用的是沙拉酱，卡罗莱纳芥末烧烤酱。"}, {"s": 1859.54, "e": 1861.45, "t": "We smoke our own pastramis.", "zh": "我们自己抽熏牛肉。"}, {"s": 1861.52, "e": 1864.08, "t": "-I'm going to do it. I'll do that pulled pork.", "zh": "-我会去做的。我来做手撕猪肉。"}, {"s": 1864.14, "e": 1865.88, "t": "-I got you, man.", "zh": "-我找到你了，伙计。"}, {"s": 1865.95, "e": 1868.04, "t": "Now the Mac is Sean's baby.", "zh": "现在 Mac 是 Sean 的宝贝。"}, {"s": 1868.11, "e": 1871.08, "t": "-The Mac and cheese? -Deep fried Mac and cheese balls.", "zh": "-通心粉和奶酪？ -油炸通心粉和奶酪球。"}, {"s": 1871.15, "e": 1872.28, "t": "That's Sean's baby.", "zh": "那是肖恩的孩子。"}, {"s": 1872.34, "e": 1873.68, "t": "-I got to do one of those.", "zh": "-我必须做其中之一。"}, {"s": 1873.75, "e": 1876.1, "t": "-Are those ready? Okay. -Yeah, they're ready.", "zh": "-那些准备好了吗？好的。 -是的，他们准备好了。"}, {"s": 1877.56, "e": 1879.56, "t": "-Did you come up with that? -Hell yeah.", "zh": "-你想出来的吗？ -天哪，是的。"}, {"s": 1879.63, "e": 1881.19, "t": "Just sound advice, bro.", "zh": "只是合理的建议，兄弟。"}, {"s": 1881.26, "e": 1884.28, "t": "-It's a meth a big thing out here? -Tweakers.", "zh": "-冰毒是这里的大事吗？ - 调整者。"}, {"s": 1884.34, "e": 1886.79, "t": "-[woman] It's everywhere. -What about Fentanyl?", "zh": "-[女人]它无处不在。 - 芬太尼怎么样？"}, {"s": 1886.86, "e": 1890.52, "t": "Oh yeah, the city's overrun with it, yeah.", "zh": "哦，是的，这个城市已经被它淹没了，是的。"}, {"s": 1890.59, "e": 1892.41, "t": "-The city, you mean Weaverville?", "zh": "-这座城市，你是说韦弗维尔吗？"}, {"s": 1892.48, "e": 1895.08, "t": "-Redding, yeah. -Oh, Redding.", "zh": "-雷丁，是的。 -哦，雷丁。"}, {"s": 1895.15, "e": 1897.2, "t": "-Oh Redding's horrible.", "zh": "-噢，雷丁太可怕了。"}, {"s": 1897.27, "e": 1898.81, "t": "-It's bad? -Oh, bad.", "zh": "- 很糟糕吗？ -哦，糟糕。"}, {"s": 1898.88, "e": 1899.88, "t": "Like scary bad.", "zh": "就像可怕的坏事一样。"}, {"s": 1899.95, "e": 1901.7, "t": "Like, so bad that I came back here.", "zh": "就像，太糟糕了，我回到了这里。"}, {"s": 1902.34, "e": 1905.39, "t": "-No way, you lived up here, went to Redding, then came back?", "zh": "-不可能，你住在这里，去了雷丁，然后又回来了？"}, {"s": 1905.46, "e": 1906.87, "t": "-Yeah, I grew up here.", "zh": "-是的，我在这里长大。"}, {"s": 1906.94, "e": 1908.01, "t": "-What was that like?", "zh": "-那是什么样的？"}, {"s": 1908.08, "e": 1909.28, "t": "Oh, it was wonderful.", "zh": "哦，太棒了。"}, {"s": 1909.35, "e": 1911.28, "t": "When I was young, I'm 34, right?", "zh": "我年轻的时候，我已经34岁了，对吗？"}, {"s": 1911.34, "e": 1912.2, "t": "-Okay.", "zh": "-好的。"}, {"s": 1912.27, "e": 1916.52, "t": "When I graduated high school, I went to college in Redding,", "zh": "当我高中毕业时，我在雷丁上大学，"}, {"s": 1916.59, "e": 1921.56, "t": "and so just 17 and a half to 19 it wasn't too bad.", "zh": "所以只有 17 岁半到 19 岁，这还不算太糟糕。"}, {"s": 1921.63, "e": 1922.55, "t": "-Yeah.", "zh": "-是的。"}, {"s": 1922.62, "e": 1924.01, "t": "Went down to the Bay Area.", "zh": "就去了湾区。"}, {"s": 1925.55, "e": 1928.68, "t": "Did my career, made a lot of money and stuff and then divorce.", "zh": "我干了自己的事业，赚了很多钱，然后离婚了。"}, {"s": 1928.75, "e": 1931.24, "t": "-What did you do? -I build Bridges.", "zh": "-你做了什么？ -我建造桥梁。"}, {"s": 1931.31, "e": 1932.78, "t": "-Oh, cool. -Yeah.", "zh": "-哦，酷。 -是的。"}, {"s": 1932.84, "e": 1937.23, "t": "But I went through a nasty divorce, lost my house and everything.", "zh": "但我经历了一场痛苦的离婚，失去了房子和一切。"}, {"s": 1937.3, "e": 1942.33, "t": "And then I came back in 2019 is when I had my divorce", "zh": "然后我在2019年回来了，当时我离婚了"}, {"s": 1942.4, "e": 1944.95, "t": "and I was just like what the heck, man?", "zh": "我当时就想，到底是怎么回事，伙计？"}, {"s": 1945.92, "e": 1950.28, "t": "I'm going that's such a short amount of time for this influx.", "zh": "我认为对于这次涌入来说，时间太短了。"}, {"s": 1950.35, "e": 1951.18, "t": "-Yeah, yeah.", "zh": "-是啊是啊。"}, {"s": 1951.25, "e": 1953.19, "t": "-I'm like, oh. -That's, that's too bad.", "zh": "-我想，哦。 ——那就是，那太糟糕了。"}, {"s": 1953.26, "e": 1956.66, "t": "I was hoping I wouldn't hear that out here, but it's everywhere.", "zh": "我希望我不会在这里听到这个声音，但它无处不在。"}, {"s": 1956.72, "e": 1958.92, "t": "I just met a woman on the Lost Coast though", "zh": "不过我刚刚在失落海岸遇到了一个女人"}, {"s": 1958.99, "e": 1962.78, "t": "and she was in rehab her fourth time, and she found a great rehab out there.", "zh": "她第四次进入康复中心，她在那里找到了一个很棒的康复中心。"}, {"s": 1962.84, "e": 1965.59, "t": "-And she's been clean five years. -Oh, that's wonderful.", "zh": "-她已经干净五年了。 -哦，那太好了。"}, {"s": 1965.66, "e": 1968.06, "t": "-Yeah, she's helping people. -That's great.", "zh": "-是的，她正在帮助人们。 -那太棒了。"}, {"s": 1968.14, "e": 1969.42, "t": "Yeah, no, I'm with that.", "zh": "是的，不，我同意。"}, {"s": 1970.61, "e": 1974.12, "t": "Do you feel pride when you go over the bridge you made?", "zh": "当你走过自己建造的桥时，你会感到自豪吗？"}, {"s": 1974.19, "e": 1975.83, "t": "-Oh heck, yeah. -Is that cool?", "zh": "-哦，哎呀，是的。 -这样酷吗？"}, {"s": 1975.9, "e": 1977.28, "t": "Oh, dude, it's awesome.", "zh": "哦，伙计，太棒了。"}, {"s": 1977.85, "e": 1980.09, "t": "Like, especially because a lot of people just", "zh": "就像，特别是因为很多人只是"}, {"s": 1981.7, "e": 1986.22, "t": "not mentally capable to handle that amount of stress and stuff, you know?", "zh": "精神上没有能力处理那么多的压力和事情，你知道吗？"}, {"s": 1986.29, "e": 1988.28, "t": "Especially when you start running work,", "zh": "尤其是当你开始工作时，"}, {"s": 1988.35, "e": 1992.09, "t": "and running crews, and running jobs, and stuff like that.", "zh": "以及管理人员、管理工作等等。"}, {"s": 1992.16, "e": 1995.96, "t": "It's just not meant for everyone, you know?", "zh": "它并不适合所有人，你知道吗？"}, {"s": 1996.03, "e": 2000.06, "t": "Have you ever driven under a bridge that's under construction?", "zh": "您是否曾在正在建设的桥梁下行驶过？"}, {"s": 2000.76, "e": 2003.14, "t": "-Like being built? -Yeah.", "zh": "-喜欢建造吗？ -是的。"}, {"s": 2003.21, "e": 2005.71, "t": "And all the things that are holding everything up.", "zh": "以及支撑一切的所有事物。"}, {"s": 2006.33, "e": 2007.85, "t": "-Yeah. -That was my specialty.", "zh": "-是的。 -那是我的专长。"}, {"s": 2009.26, "e": 2011.05, "t": "Here we go, mac balls?", "zh": "来吧，麦克球？"}, {"s": 2011.12, "e": 2012.52, "t": "-Mac and cheese balls, yeah.", "zh": "-通心粉和奶酪球，是的。"}, {"s": 2012.58, "e": 2014.94, "t": "Pulled pork with pickles.", "zh": "咸菜拉猪肉。"}, {"s": 2015.01, "e": 2017.38, "t": "-I need a third hand. -Right. [chuckles]", "zh": "-我需要第三只手。 -正确的。 [轻笑]"}, {"s": 2018.57, "e": 2020.2, "t": "-Right on, thank you. -Yeah, man.", "zh": "-好的，谢谢。 -是的，伙计。"}, {"s": 2023.13, "e": 2026.58, "t": "All right. This is looking good. Smelling good.", "zh": "好的。这看起来不错。闻起来很好闻。"}, {"s": 2031.45, "e": 2034.46, "t": "These balls are just, uh… grab a bite.", "zh": "这些球只是，呃……咬一口。"}, {"s": 2037.55, "e": 2038.39, "t": "Mmm.", "zh": "嗯。"}, {"s": 2041.71, "e": 2044.45, "t": "Messy, but wow, that's good.", "zh": "凌乱，但是哇，那很好。"}, {"s": 2045.22, "e": 2046.05, "t": "Woo.", "zh": "呜。"}, {"s": 2046.98, "e": 2047.89, "t": "Mmm.", "zh": "嗯。"}, {"s": 2050.02, "e": 2051.52, "t": "That's an interesting combo.", "zh": "这是一个有趣的组合。"}, {"s": 2052.52, "e": 2055.51, "t": "-This is so awesome. The Mac ball. -Thanks, bro. Yeah.", "zh": "-这太棒了。麦克球。 -谢谢，兄弟。是的。"}, {"s": 2056.13, "e": 2057.23, "t": "I've never had that.", "zh": "我从来没有这样过。"}, {"s": 2057.3, "e": 2058.64, "t": "-[chuckles] Yeah.", "zh": "-[笑]是的。"}, {"s": 2058.71, "e": 2060.12, "t": "That's a barbecue thing.", "zh": "那是烧烤的事情。"}, {"s": 2060.18, "e": 2062.52, "t": "The industry's come up with a couple years ago.", "zh": "该行业几年前就提出了这一点。"}, {"s": 2062.59, "e": 2063.99, "t": "-Yeah? -Yeah, man.", "zh": "-是的？ -是的，伙计。"}, {"s": 2064.69, "e": 2067.68, "t": "-I'll never be the same… ever. -Ever.", "zh": "-我永远不会一样……永远。 -曾经。"}, {"s": 2069.68, "e": 2070.8, "t": "Pulled pork sandwich.", "zh": "手撕猪肉三明治。"}, {"s": 2073.99, "e": 2074.82, "t": "Mmm.", "zh": "嗯。"}, {"s": 2076.82, "e": 2079.3, "t": "Nice smoke to it. Very tender.", "zh": "烟不错。非常温柔。"}, {"s": 2080.61, "e": 2082.45, "t": "Soft bun. You gotta have a soft bun.", "zh": "软面包。你得有一个软面包。"}, {"s": 2085.35, "e": 2086.18, "t": "Mmm.", "zh": "嗯。"}, {"s": 2090.7, "e": 2091.53, "t": "So good.", "zh": "超好的。"}, {"s": 2097.81, "e": 2100.09, "t": "And they got a cool market right next to it", "zh": "他们旁边有一个很酷的市场"}, {"s": 2100.16, "e": 2101.93, "t": "and you said a tattoo shop?", "zh": "你说纹身店？"}, {"s": 2102.01, "e": 2103.83, "t": "Yeah, down by the hotel.", "zh": "是的，就在酒店旁边。"}, {"s": 2103.89, "e": 2105.57, "t": "-Oh, there's a tattoo shop, okay.", "zh": "-哦，有一家纹身店，好吧。"}, {"s": 2105.64, "e": 2107.48, "t": "Yeah, he did all this work.", "zh": "是的，他做了所有这些工作。"}, {"s": 2107.55, "e": 2108.38, "t": "-Oh, nice.", "zh": "-哦，很好。"}, {"s": 2108.45, "e": 2110.37, "t": "All his stuff.", "zh": "所有他的东西。"}, {"s": 2110.44, "e": 2112.9, "t": "-Guys, take care. All the best. -Yeah, brother.", "zh": "-伙计们，保重。一切顺利。 -是的，兄弟。"}, {"s": 2114.86, "e": 2119.78, "t": "All right, we have an ambitious goal to go way north in the county.", "zh": "好吧，我们有一个雄心勃勃的目标，那就是在县里向北走。"}, {"s": 2119.84, "e": 2122.4, "t": "before the sun goes down but since it's going down", "zh": "太阳落山之前但太阳落山之后"}, {"s": 2122.46, "e": 2125.51, "t": "in about two minutes here over that mountain", "zh": "大约两分钟后翻过那座山"}, {"s": 2125.58, "e": 2129.27, "t": "we might be in the shadows but we're going to try to get up there.", "zh": "我们可能处于阴影之中，但我们会努力站起来。"}, {"s": 2129.98, "e": 2132.82, "t": "To Trinity Center.", "zh": "前往三一中心。"}, {"s": 2132.91, "e": 2136.75, "t": "Yeah, so this is just that part of the country where", "zh": "是的，所以这就是这个国家"}, {"s": 2138.04, "e": 2140.85, "t": "you got your little general store, maybe your restaurant.", "zh": "的一部分你有你的小杂货店，也许还有你的餐馆。"}, {"s": 2141.84, "e": 2144.53, "t": "All the locals come in, congregate there,", "zh": "所有当地人都进来，聚集在那里，"}, {"s": 2145.53, "e": 2146.93, "t": "live out in the countryside,", "zh": "住在乡下，"}, {"s": 2148.19, "e": 2153.64, "t": "and just a few of these little hubs, really, in the whole county.", "zh": "实际上，整个县只有几个这样的小中心。"}, {"s": 2158.03, "e": 2159.94, "t": "These are old the abandoned homes.", "zh": "这些都是废弃的老房子。"}, {"s": 2160.93, "e": 2165.05, "t": "You can see the forest just taking the home over.", "zh": "你可以看到森林正在接管房屋。"}, {"s": 2167.1, "e": 2168.73, "t": "Brush growing up over it.", "zh": "刷子在上面长大。"}, {"s": 2169.85, "e": 2172.65, "t": "Wow, look at these ones right in the ravine here.", "zh": "哇，看看这些就在峡谷里。"}, {"s": 2174.64, "e": 2177.69, "t": "Someone must be living down there, the porch light's still on.", "zh": "肯定有人住在下面，门廊的灯还亮着。"}, {"s": 2178.94, "e": 2180.88, "t": "Old schoolhouse up there.", "zh": "那里的老校舍。"}, {"s": 2182.67, "e": 2184.02, "t": "Let's go check it out.", "zh": "我们去看看吧。"}, {"s": 2186.41, "e": 2188.23, "t": "Wow, it's so beautiful.", "zh": "哇，太漂亮了。"}, {"s": 2189.21, "e": 2190.83, "t": "It's a schoolhouse library.", "zh": "这是一个校舍图书馆。"}, {"s": 2193.01, "e": 2197.47, "t": "Then up on the hill here, we have the congregational church.", "zh": "然后在山上，我们有公理会教堂。"}, {"s": 2200.7, "e": 2202.62, "t": "Such beautiful architecture.", "zh": "如此美丽的建筑。"}, {"s": 2205.34, "e": 2209.67, "t": "Probably built around the time the old prospectors came out,", "zh": "可能是在老探矿者出来的时候建造的，"}, {"s": 2210.69, "e": 2212.04, "t": "built up these communities.", "zh": "建立了这些社区。"}, {"s": 2212.11, "e": 2213.92, "t": "Oh, wow, look at this.", "zh": "哦，哇，看看这个。"}, {"s": 2217.64, "e": 2220.33, "t": "The nature is everywhere.", "zh": "大自然无处不在。"}, {"s": 2220.39, "e": 2221.41, "t": "Look at these guys.", "zh": "看看这些家伙。"}, {"s": 2223.8, "e": 2225.47, "t": "Beautiful animals.", "zh": "美丽的动物。"}, {"s": 2250.4, "e": 2254.41, "t": "In the distance you can see some of the peaks of the Trinity Alps.", "zh": "在远处，您可以看到三一阿尔卑斯山的一些山峰。"}, {"s": 2255.07, "e": 2257.95, "t": "Unfortunately we won't be getting deep into those.", "zh": "不幸的是我们不会深入探讨这些。"}, {"s": 2259.18, "e": 2263.24, "t": "But that is what's around here outside of these forests, these river valleys.", "zh": "但这就是这些森林、这些河谷之外的地方。"}, {"s": 2264.41, "e": 2267.52, "t": "The majority of the day has been like this.", "zh": "这一天的大部分时间都是这样。"}, {"s": 2268.17, "e": 2272.15, "t": "Open road, forests, some deer on the side of the road.", "zh": "开阔的道路，森林，路边有一些鹿。"}, {"s": 2273.59, "e": 2274.59, "t": "A stop sign.", "zh": "一个停车标志。"}, {"s": 2275.41, "e": 2277.33, "t": "A house out in the middle of nowhere.", "zh": "一座房子在荒无人烟的地方。"}, {"s": 2278.22, "e": 2282.16, "t": "It's only 16,000 people over a ton of land", "zh": "一吨土地上只有 16,000 人"}, {"s": 2282.23, "e": 2284.92, "t": "and that's the draw to Trinity County.", "zh": "这就是三一县的吸引力。"}, {"s": 2284.99, "e": 2287.13, "t": "There's nobody out there.", "zh": "外面没人。"}, {"s": 2302.93, "e": 2304.19, "t": "is that still a thing?", "zh": "那还是一件事吗？"}, {"s": 2304.27, "e": 2307.91, "t": "So what they were trying to do is make Northern California", "zh": "所以他们想做的就是让北加州"}, {"s": 2307.98, "e": 2309.2, "t": "its own separate state.", "zh": "它自己的独立状态。"}, {"s": 2309.83, "e": 2313.77, "t": "So that we could have our own separate laws for gun control, et cetera,", "zh": "这样我们就可以有自己单独的枪支管制法律等等，"}, {"s": 2313.84, "e": 2317.19, "t": "because they were trying to take away all of our guns and everything", "zh": "因为他们试图拿走我们所有的枪和一切"}, {"s": 2318.03, "e": 2319.6, "t": "here a few years back.", "zh": "几年前这里。"}, {"s": 2319.67, "e": 2323.16, "t": "So State of Jefferson was a movement where we were trying to make", "zh": "因此，《杰斐逊之国》是一场我们试图发起的运动"}, {"s": 2323.23, "e": 2325.53, "t": "Northern California, because we're so rural,", "zh": "北加州，因为我们是如此乡村，"}, {"s": 2325.59, "e": 2327.94, "t": "not like San Diego and San Francisco,", "zh": "不像圣地亚哥和旧金山，"}, {"s": 2328.01, "e": 2330.52, "t": "to be its own complete separate state.", "zh": "成为它自己完全独立的状态。"}, {"s": 2330.59, "e": 2332.97, "t": "Add an extra state to the United States.", "zh": "为美国添加一个额外的州。"}, {"s": 2333.04, "e": 2334.76, "t": "-That's a hard thing to do, huh?", "zh": "-这很难做到，是吧？"}, {"s": 2334.83, "e": 2337.43, "t": "It didn't go through but everybody still supports it.", "zh": "虽然没有成功，但是大家还是支持的。"}, {"s": 2338.38, "e": 2341.31, "t": "All the craziness that goes on in the big cities, you know?", "zh": "大城市里发生的所有疯狂事，你知道吗？"}, {"s": 2341.37, "e": 2343.48, "t": "-Okay, so no crime up here really?", "zh": "-好吧，那么这里真的没有犯罪吗？"}, {"s": 2343.55, "e": 2346.75, "t": "No, not really and if some kind of crime goes on", "zh": "不，不是真的，如果某种犯罪继续发生"}, {"s": 2346.82, "e": 2350.0, "t": "everybody usually knows exactly who it is doing it.", "zh": "每个人通常都清楚是谁在做这件事。"}, {"s": 2350.06, "e": 2354.12, "t": "So I love that small town feel where, you know,", "zh": "所以我喜欢那种小镇的感觉，你知道，"}, {"s": 2354.19, "e": 2356.92, "t": "we're all basically like a family instead of a town.", "zh": "我们基本上就像一个家庭而不是一个城镇。"}, {"s": 2356.99, "e": 2359.79, "t": "-Have you lived anywhere else or you've always been here?", "zh": "-你住在其他地方还是一直在这里？"}, {"s": 2359.86, "e": 2363.29, "t": "Fifth generation, my great-grandparents actually made Trinity Center", "zh": "第五代，我的曾祖父母实际上建造了三一中心"}, {"s": 2363.36, "e": 2365.66, "t": "when the lake inundated the old Trinity Center.", "zh": "当湖水淹没了旧三一中心时。"}, {"s": 2365.73, "e": 2368.38, "t": "-Oh, that's where I want to go to finish up the video.", "zh": "-哦，这就是我想去完成视频的地方。"}, {"s": 2368.45, "e": 2370.32, "t": "-When did they dam it? -'58.", "zh": "-他们什么时候筑坝的？ -'58。"}, {"s": 2371.04, "e": 2373.27, "t": "-Okay, and where does that water go to?", "zh": "-好吧，那水去哪儿了？"}, {"s": 2373.33, "e": 2377.16, "t": "It goes down through three pump houses to create power,", "zh": "它向下穿过三个泵房来发电，"}, {"s": 2377.23, "e": 2380.92, "t": "ultimately into Shasta Lake, and then continues on down south.", "zh": "最终进入沙斯塔湖，然后继续向南行驶。"}, {"s": 2381.94, "e": 2384.01, "t": "-How do you guys feel about that?", "zh": "-你们对此有何感想？"}, {"s": 2384.08, "e": 2388.59, "t": "Um, I know that they really didn't want it to happen before the lake was put in.", "zh": "嗯，我知道他们真的不希望在湖建成之前发生这种事。"}, {"s": 2388.65, "e": 2393.15, "t": "Now we really rely on the lake because it brings in the tourists,", "zh": "现在我们真的很依赖这个湖，因为它带来了游客，"}, {"s": 2393.22, "e": 2395.44, "t": "which keeps our economy going.", "zh": "这使我们的经济持续发展。"}, {"s": 2395.5, "e": 2398.76, "t": "-Okay, okay, 'casuse that's the main economy up here, tourism?", "zh": "-好吧，好吧，因为旅游业是这里的主要经济？"}, {"s": 2398.83, "e": 2399.68, "t": "Yes, definitely.", "zh": "是的，绝对是。"}, {"s": 2400.41, "e": 2403.74, "t": "When they told everyone they were going to put the lake in,", "zh": "当他们告诉大家他们要把湖放进去时，"}, {"s": 2403.81, "e": 2408.02, "t": "everybody was told they had to either sell their home to the government", "zh": "每个人都被告知他们必须要么把房子卖给政府"}, {"s": 2408.09, "e": 2409.12, "t": "or up and leave.", "zh": "或起身离开。"}, {"s": 2409.82, "e": 2413.51, "t": "And so everything that Trinity Center is on was my family's land.", "zh": "所以三一中心所在的一切都是我家的土地。"}, {"s": 2414.2, "e": 2417.15, "t": "And they actually brought up the Iowa Love Hall", "zh": "他们实际上提出了爱荷华州爱情大厅"}, {"s": 2417.22, "e": 2419.05, "t": "and the store and things like that.", "zh": "还有商店之类的东西。"}, {"s": 2419.12, "e": 2423.6, "t": "-Oh, they brought the buildings up from the Lake Shore?", "zh": "-哦，他们把建筑物从湖岸搬上来？"}, {"s": 2423.67, "e": 2425.89, "t": "Yeah, from down on where the lake is now.", "zh": "是的，从现在湖所在的地方看。"}, {"s": 2425.96, "e": 2429.28, "t": "Everybody who wanted to move their home, our family went ahead", "zh": "每个想搬家的人，我们一家都搬家了"}, {"s": 2429.34, "e": 2431.78, "t": "and helped them and brought their homes up here", "zh": "帮助他们并把他们的家带到这里"}, {"s": 2431.85, "e": 2434.35, "t": "and anyone who wanted to just build a new home", "zh": "以及任何想要建造新家的人"}, {"s": 2434.42, "e": 2436.37, "t": "they helped them build their new homes.", "zh": "他们帮助他们建造新家。"}, {"s": 2436.43, "e": 2438.18, "t": "They put in the streets, the roads.", "zh": "他们修建了街道、道路。"}, {"s": 2438.25, "e": 2444.11, "t": "There's actually I think it's the K-I-X-E-T-B, my uncle Lynn.", "zh": "事实上，我认为这是 K-I-X-E-T-B，我的林恩叔叔。"}, {"s": 2444.18, "e": 2447.78, "t": "It was his parents who did it and he helped build the roads and power in.", "zh": "这是他的父母做的，他帮助修建了道路和电力。"}, {"s": 2447.85, "e": 2450.4, "t": "And he did an interview about the old Trinity Center", "zh": "他接受了关于旧三一中心的采访"}, {"s": 2450.46, "e": 2452.08, "t": "becoming the new Trinity Center.", "zh": "成为新的三一中心。"}, {"s": 2452.15, "e": 2454.61, "t": "-Cool, all your family still around? -Yeah.", "zh": "-很好，你的家人都还在吗？ -是的。"}, {"s": 2454.68, "e": 2458.54, "t": "Yeah, my grandma is in her 90s and she is still running the water company.", "zh": "是啊，我奶奶已经90多岁了，她还在经营自来水公司。"}, {"s": 2458.61, "e": 2460.4, "t": "We are deeply rooted here.", "zh": "我们在这里深深扎根。"}, {"s": 2460.47, "e": 2
