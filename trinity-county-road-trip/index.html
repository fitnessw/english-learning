462.97, "t": "Okay, so tourists, this is the place to go to town?", "zh": "好吧，游客们，这是进城的地方吗？"}, {"s": 2463.03, "e": 2465.54, "t": "-Do you have a bar? -A little bit of everything.", "zh": "-你有酒吧吗？ - 一切都一点点。"}, {"s": 2465.61, "e": 2468.12, "t": "The old one that's just down the road,", "zh": "旧的就在路上，"}, {"s": 2468.19, "e": 2470.91, "t": "that used to be the bar down at the old Trinity Center.", "zh": "那曾经是旧三一中心的酒吧。"}, {"s": 2470.98, "e": 2471.93, "t": "Owners passed away.", "zh": "业主去世。"}, {"s": 2472.0, "e": 2475.0, "t": "It's up for sale, has been for a long, long time.", "zh": "已经卖了好久好久了"}, {"s": 2475.07, "e": 2477.17, "t": "There used to be a bar down by the airport.", "zh": "机场附近曾经有一家酒吧。"}, {"s": 2477.74, "e": 2478.68, "t": "Same story.", "zh": "同样的故事。"}, {"s": 2478.75, "e": 2479.71, "t": "Owners passed away.", "zh": "业主去世。"}, {"s": 2479.77, "e": 2482.1, "t": "Nobody's bought it and brought it back up.", "zh": "没有人买它并把它带回来。"}, {"s": 2482.17, "e": 2485.56, "t": "-So do most of the young people like you move out of town?", "zh": "- 那么大多数像你这样的年轻人都会搬出城吗？"}, {"s": 2486.38, "e": 2489.1, "t": "Yeah, usually when the kids around here get old enough", "zh": "是的，通常当这里的孩子足够大时"}, {"s": 2489.18, "e": 2492.37, "t": "they leave for a while but they always come back.", "zh": "他们离开一段时间，但总会回来。"}, {"s": 2492.43, "e": 2494.25, "t": "-They do? -Yeah, pretty much.", "zh": "-他们这样做吗？ -是的，差不多。"}, {"s": 2497.69, "e": 2499.8, "t": "Here's the lake we just talked about.", "zh": "这就是我们刚才谈到的那个湖。"}, {"s": 2500.74, "e": 2503.53, "t": "There's also a tiny airstrip over there.", "zh": "那边还有一个小飞机跑道。"}, {"s": 2504.98, "e": 2506.84, "t": "And that's the end of the road guys.", "zh": "伙计们，这就是路的尽头。"}, {"s": 2506.91, "e": 2511.88, "t": "I definitely underestimated the size of this county.", "zh": "我确实低估了这个县的规模。"}, {"s": 2511.95, "e": 2518.67, "t": "It's just country, nature, solitude, and beauty.", "zh": "这就是乡村、自然、孤独和美丽。"}, {"s": 2519.38, "e": 2520.71, "t": "And it goes to show you", "zh": "它向您展示"}, {"s": 2521.51, "e": 2526.38, "t": "you can never put a simple label on something such as California.", "zh": "你永远不能给加州这样的东西贴上简单的标签。"}, {"s": 2527.34, "e": 2531.22, "t": "This is California, Los Angeles is California,", "zh": "这是加利福尼亚州，洛杉矶是加利福尼亚州，"}, {"s": 2531.79, "e": 2533.42, "t": "Death Valley is California,", "zh": "死亡谷是加利福尼亚州，"}, {"s": 2534.42, "e": 2535.99, "t": "all different realities,", "zh": "所有不同的现实，"}, {"s": 2536.58, "e": 2538.53, "t": "much different feels,", "zh": "感觉很不一样，"}, {"s": 2539.39, "e": 2543.08, "t": "and completely unique and interesting places.", "zh": "以及完全独特且有趣的地方。"}, {"s": 2543.14, "e": 2545.49, "t": "Thanks for coming along on that journey, guys.", "zh": "感谢你们一路同行，伙计们。"}, {"s": 2545.56, "e": 2546.91, "t": "Until the next one.", "zh": "直到下一篇。"}];

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + sec.toString().padStart(2, '0');
}

function buildTranscript() {
  transcriptList.innerHTML = '';
  segments.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'seg';
    div.id = 'seg-' + i;
    div.innerHTML =
      '<span class="seg-time">' + fmtTime(seg.s) + '</span>' +
      '<span class="seg-content">' +
        '<span class="seg-en">' + seg.t + '</span>' +
        '<span class="seg-zh">' + (seg.zh || '') + '</span>' +
      '</span>';
    div.addEventListener('click', () => { audio.currentTime = Math.max(0, seg.s - syncOffset); audio.play(); });
    transcriptList.appendChild(div);
  });
  if (document.getElementById('toggle-zh-transcript').checked) {
    transcriptList.classList.add('show-zh');
  }
}

buildTranscript();

audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime + syncOffset;
  let found = -1;
  for (let i = 0; i < segments.length; i++) {
    if (t >= segments[i].s && t < segments[i].e) { found = i; break; }
  }
  if (found !== currentIndex) {
    subEn.classList.add('fade');
    subZh.classList.add('fade');
    setTimeout(() => {
      if (found >= 0) {
        subEn.textContent = segments[found].t;
        subZh.textContent = segments[found].zh || '';
      } else {
        subEn.textContent = '';
        subZh.textContent = '';
      }
      subEn.classList.remove('fade');
      subZh.classList.remove('fade');
    }, 80);
    if (currentIndex >= 0) {
      const old = document.getElementById('seg-' + currentIndex);
      if (old) old.classList.remove('active');
    }
    if (found >= 0) {
      const el = document.getElementById('seg-' + found);
      if (el) {
        el.classList.add('active');
        if (autoScroll) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }
    currentIndex = found;
  }
});

function skip(sec) { audio.currentTime = Math.max(0, audio.currentTime + sec); }
function setSpeed(rate) {
  audio.playbackRate = rate;
  document.querySelectorAll('[data-speed]').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.speed) === rate);
  });
}
function toggleAutoScroll() {
  autoScroll = !autoScroll;
  const btn = document.getElementById('btn-auto-scroll');
  btn.textContent = autoScroll ? '📜 Auto-scroll ON' : '📜 Auto-scroll OFF';
  btn.classList.toggle('active', autoScroll);
}
function toggleZh() {
  subZh.style.display = document.getElementById('toggle-zh').checked ? '' : 'none';
}
function toggleZhTranscript() {
  transcriptList.classList.toggle('show-zh', document.getElementById('toggle-zh-transcript').checked);
}
</script>
