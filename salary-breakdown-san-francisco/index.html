function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + sec.toString().padStart(2, '0');
}

function buildTranscript() {
  transcriptList.innerHTML = '';
  segments.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'seg';
    div.id = 'seg-' + i;
    div.innerHTML =
      '<span class="seg-time">' + fmtTime(seg.s) + '</span>' +
      '<span class="seg-content">' +
        '<span class="seg-en">' + seg.t + '</span>' +
        '<span class="seg-zh">' + (seg.zh || '') + '</span>' +
      '</span>';
    div.addEventListener('click', () => { audio.currentTime = Math.max(0, seg.s - syncOffset); audio.play(); });
    transcriptList.appendChild(div);
  });
  if (document.getElementById('toggle-zh-transcript').checked) transcriptList.classList.add('show-zh');
}
buildTranscript();

audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime + syncOffset;
  let found = -1;
  for (let i = 0; i < segments.length; i++) {
    if (t >= segments[i].s && t < segments[i].e) { found = i; break; }
  }
  if (found !== currentIndex) {
    subEn.classList.add('fade'); subZh.classList.add('fade');
    setTimeout(() => {
      if (found >= 0) { subEn.textContent = segments[found].t; subZh.textContent = segments[found].zh || ''; }
      else { subEn.textContent = ''; subZh.textContent = ''; }
      subEn.classList.remove('fade'); subZh.classList.remove('fade');
    }, 80);
    if (currentIndex >= 0) { const old = document.getElementById('seg-' + currentIndex); if (old) old.classList.remove('active'); }
    if (found >= 0) {
      const el = document.getElementById('seg-' + found);
      if (el) { el.classList.add('active'); if (autoScroll) el.scrollIntoView({ block:'nearest', behavior:'smooth' }); }
    }
    currentIndex = found;
  }
});

function skip(sec) { audio.currentTime = Math.max(0, audio.currentTime + sec); }
function setSpeed(rate) {
  audio.playbackRate = rate;
  document.querySelectorAll('[data-speed]').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.speed) === rate));
}
function toggleAutoScroll() {
  autoScroll = !autoScroll;
  const btn = document.getElementById('btn-auto-scroll');
  btn.textContent = autoScroll ? '📜 Auto-scroll ON' : '📜 Auto-scroll OFF';
  btn.classList.toggle('active', autoScroll);
}
function toggleZh() { subZh.style.display = document.getElementById('toggle-zh').checked ? '' : 'none'; }
function toggleZhTranscript() { transcriptList.classList.toggle('show-zh', document.getElementById('toggle-zh-transcript').checked); }
</script>
